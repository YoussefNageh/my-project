// ─── Advanced Financial Analytics AI ─────────────────────────────────────────
function FinancialAnalyticsAI({ patients, finances }) {
  const [loading, setLoading] = React.useState(false);
  const [report, setReport] = React.useState(null);
  const [forecastLoading, setForecastLoading] = React.useState(false);
  const [forecast, setForecast] = React.useState(null);

  // Compute aggregated financial data
  const allProcs = patients.flatMap(p => (p.procedures || []).map(pr => ({ ...pr, patientName: p.name })));
  const mats = finances.materialExpenses || [];
  const labs = finances.labExpenses || [];

  const totalRevenue = allProcs.reduce((s, p) => s + (p.cost || 0), 0);
  const totalMat = mats.reduce((s, m) => s + (parseFloat(m.cost) || 0), 0);
  const totalLab = labs.reduce((s, l) => s + (parseFloat(l.cost) || 0), 0);

  // Monthly breakdown
  const byMonth = {};
  allProcs.forEach(p => {
    const m = (p.date || "").slice(0, 7);
    if (!m) return;
    byMonth[m] = byMonth[m] || { revenue: 0, mat: 0, lab: 0 };
    byMonth[m].revenue += p.cost || 0;
  });
  mats.forEach(m => { const mo = (m.date || "").slice(0, 7); if (mo) { byMonth[mo] = byMonth[mo] || { revenue: 0, mat: 0, lab: 0 }; byMonth[mo].mat += parseFloat(m.cost) || 0; } });
  labs.forEach(l => { const mo = (l.date || "").slice(0, 7); if (mo) { byMonth[mo] = byMonth[mo] || { revenue: 0, mat: 0, lab: 0 }; byMonth[mo].lab += parseFloat(l.cost) || 0; } });

  const months = Object.keys(byMonth).sort().slice(-6);
  const chartData = months.map(m => ({ month: m.slice(5), revenue: byMonth[m].revenue, expenses: byMonth[m].mat + byMonth[m].lab, profit: byMonth[m].revenue - byMonth[m].mat - byMonth[m].lab }));
  const maxVal = Math.max(...chartData.map(d => Math.max(d.revenue, d.expenses)), 1);

  async function generateReport() {
    setLoading(true);
    try {
      const systemPrompt = `You are a dental clinic financial analyst AI. Generate a comprehensive financial performance report.
Return ONLY a JSON object:
{
  "performance_rating": "Excellent|Good|Fair|Needs Improvement",
  "revenue_analysis": "",
  "profitability_insights": [],
  "top_revenue_procedures": [],
  "expense_breakdown_analysis": "",
  "cash_flow_health": "",
  "improvement_opportunities": [],
  "benchmark_comparison": ""
}`;
      const byProc = {};
      allProcs.forEach(p => { byProc[p.procedure] = (byProc[p.procedure] || 0) + (p.cost || 0); });
      const topProcs = Object.entries(byProc).sort((a, b) => b[1] - a[1]).slice(0, 5);

      const prompt = `Total revenue: ${totalRevenue} EGP
Total material expenses: ${totalMat} EGP
Total lab expenses: ${totalLab} EGP
Net profit: ${totalRevenue - totalMat - totalLab} EGP
Profit margin: ${totalRevenue ? Math.round((totalRevenue - totalMat - totalLab) / totalRevenue * 100) : 0}%
Total patients: ${patients.length}
Monthly revenue (last 6 months): ${months.map(m => `${m}: ${byMonth[m].revenue} EGP`).join("; ")}
Top procedures by revenue: ${topProcs.map(([p, v]) => `${p}: ${v} EGP`).join("; ")}`;

      const raw = await callClaude(systemPrompt, prompt, 800);
      const clean = raw.replace(/```json|```/g, "").trim();
      setReport(JSON.parse(clean));
    } catch(e) {
      setReport({ performance_rating: "Unknown", revenue_analysis: "Could not complete analysis.", profitability_insights: [], top_revenue_procedures: [], improvement_opportunities: [] });
    }
    setLoading(false);
  }

  async function generateForecast() {
    setForecastLoading(true);
    try {
      const systemPrompt = `You are a dental clinic revenue forecasting AI. Based on historical data, provide revenue forecasts.
Return ONLY a JSON object:
{
  "next_month_forecast": {"revenue_egp":"","confidence":"Low|Medium|High","factors":[]},
  "next_quarter_forecast": {"revenue_egp":"","trend":"Growing|Stable|Declining"},
  "seasonal_patterns": [],
  "growth_recommendations": [],
  "revenue_targets": {"monthly_target":"","quarterly_target":""}
}`;
      const prompt = `Monthly history: ${months.map(m => `${m}: revenue=${byMonth[m].revenue}, expenses=${byMonth[m].mat + byMonth[m].lab}`).join("; ")}
Patient count: ${patients.length}
Today: ${today()}`;

      const raw = await callClaude(systemPrompt, prompt, 600);
      const clean = raw.replace(/```json|```/g, "").trim();
      setForecast(JSON.parse(clean));
    } catch(e) {
      setForecast({ next_month_forecast: { revenue_egp: "N/A", confidence: "Low", factors: [] }, next_quarter_forecast: { revenue_egp: "N/A", trend: "Stable" }, seasonal_patterns: [], growth_recommendations: [] });
    }
    setForecastLoading(false);
  }

  const ratingColor = r => r === "Excellent" ? "#2e7d32" : r === "Good" ? "#1565c0" : r === "Fair" ? "#e65100" : "#c62828";
  const trendColor = t => t === "Growing" ? "#2e7d32" : t === "Declining" ? "#c62828" : "#1565c0";

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>

      {/* Mini Bar Chart */}
      {chartData.length > 0 && (
        <div style={S.card}>
          <h3 style={{ ...S.sh, color: "#1a237e" }}>📈 Revenue vs Expenses (Last 6 Months)</h3>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 120, padding: "0 0.5rem" }}>
            {chartData.map((d, i) => (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <div style={{ width: "100%", display: "flex", gap: 2, alignItems: "flex-end", height: 100 }}>
                  <div style={{ flex: 1, background: "#4caf50", borderRadius: "3px 3px 0 0", height: `${Math.round(d.revenue / maxVal * 100)}%`, minHeight: 2 }} title={`Revenue: ${fmt(d.revenue)}`} />
                  <div style={{ flex: 1, background: "#ef5350", borderRadius: "3px 3px 0 0", height: `${Math.round(d.expenses / maxVal * 100)}%`, minHeight: 2 }} title={`Expenses: ${fmt(d.expenses)}`} />
                </div>
                <div style={{ fontSize: 9, color: "#888" }}>{d.month}</div>
                <div style={{ fontSize: 9, fontWeight: 700, color: d.profit >= 0 ? "#2e7d32" : "#c62828" }}>{d.profit >= 0 ? "+" : ""}{Math.round(d.profit / 1000)}k</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 6 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}><div style={{ width: 10, height: 10, background: "#4caf50", borderRadius: 2 }} />Revenue</div>
            <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}><div style={{ width: 10, height: 10, background: "#ef5350", borderRadius: 2 }} />Expenses</div>
          </div>
        </div>
      )}

      {/* AI Financial Report */}
      <div style={S.card}>
        <h3 style={{ ...S.sh, color: "#1a237e" }}>🤖 AI Financial Report</h3>
        <button onClick={generateReport} disabled={loading} style={{ ...S.btn(loading ? "#e0e0e0" : "#1565c0"), marginBottom: 10 }}>
          {loading ? "⏳ Analyzing Finances…" : "📊 Generate AI Financial Report"}
        </button>

        {report && (
          <div style={{ background: "#e8f0fe", borderRadius: 10, padding: "10px 12px", border: "1px solid #90caf9" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#1a237e" }}>📊 Performance Report</div>
              <span style={{ background: ratingColor(report.performance_rating), color: "#fff", borderRadius: 20, padding: "3px 12px", fontSize: 12, fontWeight: 700 }}>{report.performance_rating}</span>
            </div>

            {report.revenue_analysis && <div style={{ fontSize: 12, color: "#333", marginBottom: 8, background: "#fff", borderRadius: 8, padding: "8px 10px" }}>{report.revenue_analysis}</div>}

            {(report.profitability_insights || []).length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#2e7d32", marginBottom: 4 }}>💡 Profitability Insights</div>
                {report.profitability_insights.map((ins, i) => <div key={i} style={{ fontSize: 12, color: "#333", marginBottom: 2 }}>• {ins}</div>)}
              </div>
            )}

            {(report.top_revenue_procedures || []).length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#1a237e", marginBottom: 4 }}>🦷 Top Revenue Procedures</div>
                {report.top_revenue_procedures.map((p, i) => <div key={i} style={{ fontSize: 12, color: "#333", marginBottom: 2 }}>• {p}</div>)}
              </div>
            )}

            {(report.improvement_opportunities || []).length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#e65100", marginBottom: 4 }}>🚀 Growth Opportunities</div>
                {report.improvement_opportunities.map((o, i) => <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 2 }}>• {o}</div>)}
              </div>
            )}

            {report.benchmark_comparison && <div style={{ fontSize: 11, color: "#888", marginTop: 6, fontStyle: "italic" }}>📈 {report.benchmark_comparison}</div>}
          </div>
        )}
      </div>

      {/* Revenue Forecasting */}
      <div style={S.card}>
        <h3 style={{ ...S.sh, color: "#6a1b9a" }}>🔮 Revenue Forecasting AI</h3>
        <button onClick={generateForecast} disabled={forecastLoading} style={{ ...S.btn(forecastLoading ? "#e0e0e0" : "#6a1b9a"), marginBottom: 10 }}>
          {forecastLoading ? "⏳ Forecasting…" : "🔮 Generate Revenue Forecast"}
        </button>

        {forecast && (
          <div style={{ background: "#f3e5f5", borderRadius: 10, padding: "10px 12px", border: "1px solid #ce93d8" }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#4a148c", marginBottom: 10 }}>🔮 Revenue Forecast</div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
              {forecast.next_month_forecast && (
                <div style={{ background: "#fff", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, color: "#888" }}>Next Month</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: "#6a1b9a" }}>{forecast.next_month_forecast.revenue_egp} EGP</div>
                  <div style={{ fontSize: 11, color: "#888" }}>Confidence: {forecast.next_month_forecast.confidence}</div>
                  {(forecast.next_month_forecast.factors || []).map((f, i) => <div key={i} style={{ fontSize: 10, color: "#555", marginTop: 2 }}>• {f}</div>)}
                </div>
              )}
              {forecast.next_quarter_forecast && (
                <div style={{ background: "#fff", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, color: "#888" }}>Next Quarter</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: trendColor(forecast.next_quarter_forecast.trend) }}>{forecast.next_quarter_forecast.revenue_egp} EGP</div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: trendColor(forecast.next_quarter_forecast.trend) }}>{forecast.next_quarter_forecast.trend}</div>
                </div>
              )}
            </div>

            {(forecast.seasonal_patterns || []).length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#4a148c", marginBottom: 4 }}>📊 Seasonal Patterns</div>
                {forecast.seasonal_patterns.map((p, i) => <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 2 }}>• {p}</div>)}
              </div>
            )}

            {(forecast.growth_recommendations || []).length > 0 && (
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#2e7d32", marginBottom: 4 }}>🚀 Growth Strategies</div>
                {forecast.growth_recommendations.map((r, i) => <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 2 }}>• {r}</div>)}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Smart Inventory AI ───────────────────────────────────────────────────────
function SmartInventoryAI({ finances, setFinances }) {
  const [loading, setLoading] = React.useState(false);
  const [analysis, setAnalysis] = React.useState(null);

  const materials = finances.clinicMaterials || [];

  async function analyzeInventory() {
    setLoading(true);
    const expiring = materials.filter(m => {
      if (!m.expiryDate) return false;
      const days = (new Date(m.expiryDate) - new Date()) / (1000 * 60 * 60 * 24);
      return days >= 0 && days <= 60;
    });
    const expired = materials.filter(m => m.expiryDate && new Date(m.expiryDate) < new Date());

    try {
      const systemPrompt = `You are a dental clinic inventory management AI. Analyze the clinic's material inventory and provide smart management recommendations.
Return ONLY a JSON object:
{
  "inventory_health": "Excellent|Good|Needs Attention|Critical",
  "stock_alerts": [{"item":"","issue":"","action":""}],
  "reorder_suggestions": [{"item":"","category":"","reason":"","suggested_quantity":"","estimated_cost":""}],
  "waste_reduction_tips": [],
  "cost_optimization": [],
  "storage_recommendations": []
}`;
      const prompt = `Total items: ${materials.length}
Expired: ${expired.map(m => m.name).join(", ") || "None"}
Expiring <60 days: ${expiring.map(m => `${m.name}(${m.expiryDate})`).join(", ") || "None"}
Inventory: ${materials.slice(0, 15).map(m => `${m.name}(${m.quantity}${m.unit}, ${m.category})`).join("; ")}
Total stock value: ${materials.reduce((s, m) => s + (parseFloat(m.cost) || 0) * (parseFloat(m.quantity) || 1), 0)} EGP`;

      const raw = await callClaude(systemPrompt, prompt, 700);
      const clean = raw.replace(/```json|```/g, "").trim();
      setAnalysis(JSON.parse(clean));
    } catch(e) {
      setAnalysis({ inventory_health: "Unknown", stock_alerts: [], reorder_suggestions: [], waste_reduction_tips: ["Track expiry dates regularly"], cost_optimization: [], storage_recommendations: [] });
    }
    setLoading(false);
  }

  const healthColor = h => h === "Excellent" ? "#2e7d32" : h === "Good" ? "#1565c0" : h === "Needs Attention" ? "#e65100" : "#c62828";

  return (
    <div style={S.card}>
      <h3 style={{ ...S.sh, color: "#e65100" }}>🧠 Smart Inventory AI</h3>
      <div style={{ fontSize: 12, color: "#666", marginBottom: 10 }}>
        AI-powered stock analysis, reorder suggestions, and waste reduction.
      </div>

      <button onClick={analyzeInventory} disabled={loading} style={{ ...S.btn(loading ? "#e0e0e0" : "#e65100"), marginBottom: 12 }}>
        {loading ? "⏳ Analyzing Inventory…" : "🧪 Analyze Inventory with AI"}
      </button>

      {analysis && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#333" }}>Inventory Health:</div>
            <span style={{ background: healthColor(analysis.inventory_health), color: "#fff", borderRadius: 20, padding: "3px 14px", fontSize: 12, fontWeight: 700 }}>{analysis.inventory_health}</span>
          </div>

          {(analysis.stock_alerts || []).length > 0 && (
            <div style={{ background: "#fce4ec", borderRadius: 8, padding: "10px 12px", border: "1px solid #ef9a9a" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#c62828", marginBottom: 5 }}>🚨 Stock Alerts</div>
              {analysis.stock_alerts.map((a, i) => (
                <div key={i} style={{ marginBottom: 4 }}>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{a.item}</div>
                  <div style={{ fontSize: 11, color: "#666" }}>{a.issue} → <strong>{a.action}</strong></div>
                </div>
              ))}
            </div>
          )}

          {(analysis.reorder_suggestions || []).length > 0 && (
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#e65100", marginBottom: 5 }}>🛒 Reorder Suggestions</div>
              {analysis.reorder_suggestions.map((r, i) => (
                <div key={i} style={{ background: "#fff3e0", borderRadius: 8, padding: "8px 10px", marginBottom: 5, border: "1px solid #ffe082" }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600 }}>{r.item}</div>
                      <div style={{ fontSize: 11, color: "#666" }}>{r.category} · {r.reason}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 11, fontWeight: 600 }}>{r.suggested_quantity}</div>
                      {r.estimated_cost && <div style={{ fontSize: 10, color: "#2e7d32" }}>{r.estimated_cost} EGP</div>}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {(analysis.waste_reduction_tips || []).length > 0 && (
            <div style={{ background: "#e8f5e9", borderRadius: 8, padding: "10px 12px", border: "1px solid #a5d6a7" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#2e7d32", marginBottom: 5 }}>♻️ Waste Reduction</div>
              {analysis.waste_reduction_tips.map((t, i) => <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 2 }}>• {t}</div>)}
            </div>
          )}

          {(analysis.cost_optimization || []).length > 0 && (
            <div style={{ background: "#e3f2fd", borderRadius: 8, padding: "10px 12px", border: "1px solid #90caf9" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1565c0", marginBottom: 5 }}>💰 Cost Optimization</div>
              {analysis.cost_optimization.map((t, i) => <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 2 }}>• {t}</div>)}
            </div>
          )}
        </div>
      )}
    </div>

window.addEventListener('storage', function(e) {
  if (!e.key || !e.key.startsWith('dp_patients_')) return;
  
  // إظهار notification للدكتور
  var banner = document.getElementById('dp-mobile-sync-banner');

    banner.id = 'dp-mobile-sync-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(90deg,#2e7d32,#4caf50);color:#fff;padding:10px 20px;text-align:center;font-size:13px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,0.3);cursor:pointer;';
    banner.innerHTML = '📱 Mobile Update Received! Click to refresh patient data ↻';

      window.location.reload();

  }
});




    // ─── Main persistent app ──────────────────────────────────────────────────
    // Version config: change MAX_DENTISTS to 2 or 4
    const MAX_DENTISTS = 4;

    function PersistentApp() {
      // ── global state (shared across doctors) ──────────────────────────────
      const [dentists,       setDentists]       = React.useState(() => loadState('dp_dentists', []));
      const [activeDentistId,setActiveDentistId]= React.useState(null);
      const [darkMode,       setDarkMode]       = React.useState(() => loadState('dp_dark', false));
      const [calLinks,       setCalLinks]       = React.useState(() => loadState('dp_callinks', true));
      const [showSettings,   setShowSettings]   = React.useState(false);
      const [aiSettings,     setAiSettings]     = React.useState(() => loadState('dp_ai_settings', { xrayAnalysis: true, treatmentPlanning: false, patientAnalysis: false }));

      // ── per-doctor state (loaded fresh on login, saved under doctor key) ──
      const [patients,  setPatients]  = React.useState([]);
      const [finances,  setFinances]  = React.useState({materialExpenses:[],labExpenses:[]});
      const [selectedId,setSelectedId]= React.useState(null);
      const [page,      setPage]      = React.useState('patients');
      const [unsaved,   setUnsaved]   = React.useState(false);
      const [pending,   setPending]   = React.useState(null);
      const [showWarn,  setShowWarn]  = React.useState(false);

      // ── save dentists list whenever it changes ────────────────────────────
      React.useEffect(()=>{
  saveState('dp_dentists', dentists);
  // ✅ احفظ الدكاترة على Firebase عشان الموبايل يشوفهم
  if (dentists.length > 0) {
    const batch = db.batch();
    dentists.forEach(d => {
      const ref = db.collection('dentists').doc(String(d.id));
      batch.set(ref, {
        id: d.id,
        name: d.name,
        clinicName: d.clinicName,
        specialty: d.specialty || '',
        phone: d.phone || '',
        email: d.email || '',
        username: d.username,
        password: d.password
      });
    });
    batch.commit()
      .then(() => console.log('Dentists synced to Firebase'))
      .catch(e => console.error('Dentist sync error:', e));
  }
}, [dentists]);
      React.useEffect(()=>{ saveState('dp_dark', darkMode); applyTheme(darkMode); }, [darkMode]);
      React.useEffect(()=>{ saveState('dp_callinks', calLinks); }, [calLinks]);
      React.useEffect(()=>{ applyTheme(darkMode); }, []);
      React.useEffect(()=>{ saveState('dp_ai_settings', aiSettings); }, [aiSettings]);

      // Re-register notification timers whenever the page becomes visible again
      React.useEffect(() => {
        function onVisible() {
          if (document.visibilityState === 'visible') {
            registerAllNotifs(patients);
          }
        }
        document.addEventListener('visibilitychange', onVisible);
        window.addEventListener('focus', onVisible);
        return () => {
          document.removeEventListener('visibilitychange', onVisible);
          window.removeEventListener('focus', onVisible);
        };
      }, [patients]);

      // ── per-doctor auto-save (keyed by doctor id) ─────────────────────────
      React.useEffect(()=>{
        if (!activeDentistId) return;
        saveState('dp_patients_' + activeDentistId, patients);
        saveState('dp_database_backup_' + activeDentistId, {
          exportedAt: new Date().toISOString(),
          doctorId: activeDentistId,
          patients, finances
        });
      }, [patients, activeDentistId]);

      React.useEffect(()=>{
        if (!activeDentistId) return;
        saveState('dp_finances_' + activeDentistId, finances);
      }, [finances, activeDentistId]);

      const activeDentist = dentists.find(d => d.id === activeDentistId);

      // ── SCREEN: first-time setup ──────────────────────────────────────────
      if (dentists.length === 0) {
        return <DentistSetupPage existingDentists={[]} maxDentists={MAX_DENTISTS}
          onSave={d=>{
            setDentists([d]);
            setPatients(loadState('dp_patients_' + d.id, []));
            setFinances(loadState('dp_finances_' + d.id, {materialExpenses:[],labExpenses:[]}));
            setActiveDentistId(d.id);
          }} onCancel={null}/>;
      }

      // ── SCREEN: login ─────────────────────────────────────────────────────
      if (!activeDentist) {
        return <LoginPage dentists={dentists} onLogin={d=>{
          // Load THIS doctor's own data from their private localStorage keys
          setPatients(loadState('dp_patients_' + d.id, []));
          setFinances(loadState('dp_finances_' + d.id, {materialExpenses:[],labExpenses:[]}));
          setSelectedId(null);
          setPage('patients');
          setActiveDentistId(d.id);
        }}/>;
      }

      // ── logged in ─────────────────────────────────────────────────────────
      const realSelectedId = selectedId || (patients[0]?.id);
      const sel = patients.find(p => p.id === realSelectedId);

      function updatePatient(id, patch) {
        setPatients(prev=>prev.map(p=>p.id===id?{...p,...patch}:p));
      }
      function handleNavigate(patientId, targetPage) {
        if (targetPage===null) { setSelectedId(patientId); return; }
        if (unsaved) { setPending({patientId,targetPage}); setShowWarn(true); }
        else { setSelectedId(patientId); setPage(targetPage); setUnsaved(false); }
      }
      function doSwitch() {
        if(pending){ setSelectedId(pending.patientId); setPage(pending.targetPage); }
        setPending(null); setShowWarn(false); setUnsaved(false);
      }
      function handleHistorySave(data) {
        updatePatient(realSelectedId,{chiefComplaint:data.chiefComplaint,medHist:data.medHist,dentalNotes:data.dentalNotes,dentalChart:data.dentalChart});
      }
      function handleProcSave({procedure})   { updatePatient(realSelectedId,{procedures:[...(sel.procedures||[]),procedure]}); }
      function handleApptSave({appointment}) { updatePatient(realSelectedId,{appointments:[...(sel.appointments||[]),appointment]}); }
      function handleImageSave({image})      { updatePatient(realSelectedId,{images:[...(sel.images||[]),image]}); }
      function handleOrthoSave({orthoPayment,orthoTotal,orthoNotes}) {
        const prev=sel.ortho||{totalAmount:0,payments:[],notes:''};
        const payments=orthoPayment?[...prev.payments,orthoPayment]:prev.payments;
        const total=orthoTotal!==undefined?parseFloat(orthoTotal)||0:prev.totalAmount;
        const notes=orthoNotes!==undefined?orthoNotes:prev.notes;
        const paid=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
        updatePatient(realSelectedId,{ortho:{totalAmount:total,payments,notes,totalPaid:paid,balance:total-paid}});
      }
      function handleDelete(type,id) {
        if(!sel)return;
        if(type==='procedure')   updatePatient(realSelectedId,{procedures:(sel.procedures||[]).filter(x=>x.id!==id)});
        else if(type==='appointment') updatePatient(realSelectedId,{appointments:(sel.appointments||[]).filter(x=>x.id!==id)});
        else if(type==='image')  updatePatient(realSelectedId,{images:(sel.images||[]).filter(x=>x.id!==id)});
        else if(type==='orthoPayment'){
          const prev=sel.ortho||{};
          const payments=(prev.payments||[]).filter(x=>x.id!==id);
          const paid=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
          updatePatient(realSelectedId,{ortho:{...prev,payments,totalPaid:paid,balance:(prev.totalAmount||0)-paid}});
        }
      }

      // ── theme-aware colours ───────────────────────────────────────────────
      const sidebarBg  = darkMode ? '#07091a' : '#1a237e';
      const mainBg     = darkMode ? '#0a0c14' : '#f0f2f8';

      const NAV = [
        ['patients','👥','Patients'],
        ['history','📋','Dental & Medical History'],
        ['procedures','🦷','Dental Procedures'],
        ['appointments','📅','Appointments'],
        ['xrays','📷','X-Rays & Photos'],
        ['ortho','🦷','Ortho Patients'],
        ['materials','🧪','Clinic Materials'],
        ['finances','💰','Finances'],
        ['ai','🤖','AI Hub'],
      ];

      return (
        <div style={{display:'flex',height:'100vh',fontFamily:"'Segoe UI',system-ui,sans-serif",
          background:mainBg,overflow:'hidden',transition:'background .3s'}}>

          {/* ── Sidebar ─────────────────────────────────────────────────── */}
          <div style={{width:240,background:sidebarBg,color:'#fff',display:'flex',
            flexDirection:'column',flexShrink:0,transition:'background .3s'}}>

            {/* Logo + dentist info */}

                {activeDentist.clinicName}
              </div>
            </div>

            {/* Nav */}
            <nav style={{padding:'.4rem 0'}}>
              {NAV.map(([pg,icon,lbl])=>(
                <button key={pg} onClick={()=>handleNavigate(realSelectedId,pg)} style={{
                  width:'100%',textAlign:'left',
                  background:page===pg?'rgba(255,255,255,0.15)':'transparent',
                  color:'#fff',border:'none',padding:'8px 1.1rem',cursor:'pointer',
                  display:'flex',alignItems:'center',gap:8,fontSize:13,
                  borderLeft:page===pg?'3px solid #90caf9':'3px solid transparent'
                }}>
                  <span>{icon}</span><span>{lbl}</span>
                  {pg==='ortho'&&<span style={{marginLeft:'auto',background:'#b71c1c',borderRadius:10,padding:'1px 6px',fontSize:9,fontWeight:700}}>ORTHO</span>}
                  {pg==='ai'&&<span style={{marginLeft:'auto',background:'linear-gradient(135deg,#6a1b9a,#c62828)',borderRadius:10,padding:'1px 6px',fontSize:9,fontWeight:700}}>NEW</span>}
                </button>
              ))}

                padding:'.4rem 1.1rem .2rem',textTransform:'uppercase',letterSpacing:.5}}>Patients</div>

            {page==='materials'   && <ClinicMaterialsPage finances={finances} setFinances={setFinances}/>}
            {page==='finances'    && <FinancesPage patients={patients} finances={finances} setFinances={setFinances}/>}
            {page==='ai'          && <AIHubPage patients={patients} finances={finances} setFinances={setFinances} dentist={activeDentist} aiSettings={aiSettings} onSaveAISettings={s=>{setAiSettings(s);saveState('dp_ai_settings',s);}}/>}
          </div>

          {/* ── Modals ───────────────────────────────────────────────────── */}
          {showWarn && <SaveWarning
            onSave={()=>{ if(page==='history') handleHistorySave({chiefComplaint:sel.chiefComplaint,medHist:sel.medHist,dentalNotes:sel.dentalNotes,dentalChart:sel.dentalChart}); doSwitch(); }}
            onDiscard={doSwitch}
            onCancel={()=>{ setShowWarn(false); setPending(null); }}
          />}
          {showSettings && <SettingsPage
            dentist={activeDentist}
            dentists={dentists}
            maxDentists={MAX_DENTISTS}
            darkMode={darkMode}
            onToggleDark={()=>setDarkMode(d=>!d)}
            calLinks={calLinks}
            onToggleCalLinks={()=>setCalLinks(v=>!v)}
            onUpdateDentist={updated=>setDentists(prev=>prev.map(d=>d.id===updated.id?updated:d))}
            onAddDentist={d=>{ setDentists(prev=>[...prev,d]); saveState('dp_patients_'+d.id,[]); saveState('dp_finances_'+d.id,{materialExpenses:[],labExpenses:[]}); }}
            onClose={()=>setShowSettings(false)}
          />}
        </div>
      );
    }

    // ── AI-enhanced History Page wrapper ──────────────────────────────────────
    // This wrapper owns a ref that HistoryPage exposes via an "externalSetter"
    // prop, so voice data can be injected directly into every form field.
    function HistoryPageWithAI({ patient, onSave, unsaved, setUnsaved, aiSettings }) {
      // We keep a ref to the HistoryPage's internal setD function
      const historySetDRef  = React.useRef(null);
      const historySetChartRef = React.useRef(null);
      const [applyFlash, setApplyFlash] = React.useState(false);
      const [appliedSummary, setAppliedSummary] = React.useState("");

      // ── Known preset lists (must match HistoryPage exactly) ──────────────
      const MED_CONDITIONS  = ["Hypertension","Heart Disease","Diabetes Mellitus","Asthma","COPD","Liver Disease","Kidney Disease","Thyroid Disorder","Autoimmune Disorder","HIV/AIDS","Hepatitis B","Hepatitis C","Tuberculosis","Cancer","Bleeding Disorder","Epilepsy"];
      const ALLERGIES_LIST  = ["Penicillin","Amoxicillin","Cephalosporin","Sulfa","Aspirin","Ibuprofen","Codeine","Local Anesthetic","Latex","Nickel"];
      const MEDS_LIST       = ["Anticoagulant Therapy","Antiplatelet Therapy","Bisphosphonate Therapy","Immunosuppressive Therapy","Chemotherapy","Radiation Therapy","Corticosteroids","Insulin","Oral Hypoglycemic","Antihypertensive"];

      // ── Called by VoiceInputButton after AI extraction ───────────────────
      function applyVoiceData(parsed) {
        if (!parsed || !historySetDRef.current) return;

        // For each array field: split into known presets + custom remainder
        function splitKnown(items, knownList) {
          const known  = (items || []).filter(x => knownList.some(k => k.toLowerCase() === x.toLowerCase()));
          const custom = (items || []).filter(x => !knownList.some(k => k.toLowerCase() === x.toLowerCase()));
          // Normalise known items to their exact preset capitalisation
          const normalised = known.map(x => knownList.find(k => k.toLowerCase() === x.toLowerCase()) || x);
          return { known: normalised, custom };
        }

        const cond = splitKnown(parsed.conditions  || [], MED_CONDITIONS);
        const alle = splitKnown(parsed.allergies   || [], ALLERGIES_LIST);
        const meds = splitKnown(parsed.medications || [], MEDS_LIST);

        // Build combined arrays: presets + any custom items appended
        const allConditions  = [...cond.known,  ...cond.custom];
        const allAllergies   = [...alle.known,  ...alle.custom];
        const allMedications = [...meds.known,  ...meds.custom];

        // ── Inject into HistoryPage's setD ───────────────────────────────
        historySetDRef.current(prev => ({
          ...prev,
          // Chief complaint
          ...(parsed.chiefComplaint ? { chiefComplaint: parsed.chiefComplaint } : {}),
          // Medical arrays
          conditions:  allConditions.length  ? allConditions  : prev.conditions,
          allergies:   allAllergies.length   ? allAllergies   : prev.allergies,
          medications: allMedications.length ? allMedications : prev.medications,
          // Free-text custom overflows
          ...(cond.custom.length ? { otherConditions:  cond.custom.join(", ") } : {}),
          ...(alle.custom.length ? { otherAllergies:   alle.custom.join(", ") } : {}),
          ...(meds.custom.length ? { otherMedications: meds.custom.join(", ") } : {}),
          // Habits
          ...(parsed.smoking    && parsed.smoking   !== "" ? { smoking:    parsed.smoking   } : {}),
          ...(parsed.alcohol    && parsed.alcohol   !== "" ? { alcohol:    parsed.alcohol   } : {}),
          ...(parsed.otherHabits                           ? { otherHabits: parsed.otherHabits } : {}),
          ...(parsed.betelQuid !== undefined               ? { betelQuid:  !!parsed.betelQuid } : {}),
          // Pregnancy
          ...(parsed.pregnant  !== undefined ? { pregnant:  !!parsed.pregnant  } : {}),
          ...(parsed.nursing   !== undefined ? { nursing:   !!parsed.nursing   } : {}),
          ...(parsed.trimester               ? { trimester:  parsed.trimester  } : {}),
          // Vitals — only overwrite if non-empty
          ...(parsed.bp     ? { bp:     parsed.bp     } : {}),
          ...(parsed.hr     ? { hr:     parsed.hr     } : {}),
          ...(parsed.rr     ? { rr:     parsed.rr     } : {}),
          ...(parsed.temp   ? { temp:   parsed.temp   } : {}),
          ...(parsed.height ? { height: parsed.height } : {}),
          ...(parsed.weight ? { weight: parsed.weight } : {}),
          // Additional medical history
          ...(parsed.anesthesiaReaction ? { anesthesiaReaction: parsed.anesthesiaReaction } : {}),
          ...(parsed.bleedingHistory    ? { bleedingHistory:    parsed.bleedingHistory    } : {}),
          ...(parsed.healingHistory     ? { healingHistory:     parsed.healingHistory     } : {}),
          ...(parsed.additionalNotes    ? { additionalNotes:    parsed.additionalNotes    } : {}),
          // Dental notes — APPEND so existing notes are preserved
          ...(parsed.dentalNotes ? {
            dentalNotes: prev.dentalNotes
              ? prev.dentalNotes.trimEnd() + "\n\n" + parsed.dentalNotes
              : parsed.dentalNotes
          } : {}),
        }));

        setUnsaved(true);
        setAppliedSummary(parsed.summary || "All fields updated from voice.");
        setApplyFlash(true);
        setTimeout(() => setApplyFlash(false), 5000);
      }

      return (
        <div>
          {/* ── Voice toolbar ─────────────────────────────────────────── */}
          <div style={{
            padding: "0.75rem 1.5rem",
            display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap",
            background: "linear-gradient(90deg,#f3e5f5,#e8eaf6)",
            borderBottom: "2px solid #ce93d8"
          }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#4a148c" }}>🎙️ Voice History Entry</div>
              <div style={{ fontSize: 11, color: "#7b1fa2" }}>Speak the full patient history — AI fills every field automatically</div>
            </div>
            <VoiceInputButton
              context="full medical & dental history"
              onResult={applyVoiceData}
              style={{ marginLeft: "auto" }}
            />
            {applyFlash && (
              <div style={{
                background: "#e8f5e9", border: "1px solid #66bb6a",
                borderRadius: 10, padding: "8px 14px", fontSize: 12,
                color: "#1b5e20", maxWidth: 420, lineHeight: 1.5,
                display: "flex", gap: 8, alignItems: "flex-start"
              }}>
                <span style={{ fontSize: 16 }}>✅</span>
                <div>
                  <strong>All fields auto-filled!</strong><br/>
                  <span style={{ fontSize: 11 }}>{appliedSummary}</span><br/>
                  <span style={{ fontSize: 10, color: "#2e7d32", fontStyle: "italic" }}>
                    Review fields below, then click Save History.
                  </span>
                </div>
              </div>
            )}
          </div>

          {/* ── The actual history form (receives setter refs) ─────────── */}
          <HistoryPage
            patient={patient}
            onSave={onSave}
            unsaved={unsaved}
            setUnsaved={setUnsaved}
            externalSetD={fn => { historySetDRef.current = fn; }}
          />

          {/* ── Optional AI panels below ───────────────────────────────── */}
          <div style={{ padding: "0 1.5rem 1.5rem" }}>
            {aiSettings.treatmentPlanning && <TreatmentPlanAI patient={patient} enabled={true} />}
            {aiSettings.patientAnalysis   && <PatientRecordsAI patient={patient} />}
          </div>
        </div>
      );
    }

    // ── AI-enhanced X-Rays Page wrapper ──────────────────────────────────────
    function XRaysPageWithAI({ patient, onSave, onDelete, aiSettings }) {
      const [lastSavedImage, setLastSavedImage] = React.useState(null);

      function handleSaveWithAI(data) {
        onSave(data);
        if (data.image) setLastSavedImage(data.image);
      }

      return (
        <div>
          <XRaysPage patient={patient} onSave={handleSaveWithAI} onDelete={onDelete} />
          {/* AI analysis panel for the most recently uploaded image */}
          {aiSettings.xrayAnalysis && lastSavedImage && lastSavedImage.previewUrl && (
            <div style={{ padding: "0 1.5rem 1.5rem" }}>
              <div style={{ ...S.card, background: "#f3e5f5", border: "1px solid #ce93d8" }}>
                <h3 style={{ ...S.sh, color: "#4a148c" }}>🤖 AI Analysis — {lastSavedImage.type}</h3>
                <XRayAIAnalysis image={lastSavedImage} enabled={true} />
              </div>
            </div>
          )}
          {/* Also show AI analysis button on existing images */}
          {aiSettings.xrayAnalysis && (patient.images || []).filter(img => img.previewUrl).length > 0 && !lastSavedImage && (
            <div style={{ padding: "0 1.5rem 1.5rem" }}>
              <div style={{ ...S.card, background: "#f3e5f5", border: "1px solid #ce93d8" }}>
                <h3 style={{ ...S.sh, color: "#4a148c" }}>🤖 AI X-Ray Analysis</h3>
                <div style={{ fontSize: 12, color: "#666", marginBottom: 10 }}>Select an image below to analyze with AI:</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {(patient.images || []).filter(img => img.previewUrl).map((img, i) => (
                    <div key={i} style={{ border: "1px solid #ce93d8", borderRadius: 8, overflow: "hidden", width: 120 }}>
                      <img src={img.previewUrl} alt={img.type} style={{ width: "100%", height: 70, objectFit: "cover" }} />
                      <div style={{ padding: "4px 6px" }}>
                        <div style={{ fontSize: 10, color: "#4a148c", fontWeight: 600 }}>{img.type}</div>
                        <XRayAIAnalysis image={img} enabled={true} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PersistentApp />);
  </script>
</body>
</html>
