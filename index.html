function syncPatientsToFirebase(dentistId, patients) {
  const batch = db.batch();
  const ref = db.collection('clinics').doc(String(dentistId)).collection('patients');
  patients.forEach(function(patient) {
    const docRef = ref.doc(String(patient.id));
    const data = Object.assign({}, patient, {updatedAt: new Date().toISOString()});
    batch.set(docRef, data);
  });
  return batch.commit()
    .then(function() { console.log('Synced to Firebase:', patients.length); })
    .catch(function(e) { console.error('Firebase sync error:', e); });
}

function loadPatientsFromFirebase(dentistId) {
  return db.collection('clinics').doc(String(dentistId)).collection('patients').get()
    .then(function(snapshot) {
      const patients = [];
      snapshot.forEach(function(doc) { patients.push(doc.data()); });
      console.log('Loaded from Firebase:', patients.length);
      return patients;
    })
    .catch(function(e) {
      console.error('Firebase load error:', e);
      return null;
    });
}

function watchFirebaseChanges(dentistId, onUpdate) {
  return db.collection('clinics').doc(String(dentistId)).collection('patients')
    .onSnapshot(function(snapshot) {
      snapshot.docChanges().forEach(function(change) {
        if (change.type === 'modified' || change.type === 'added') {
          console.log('Mobile update detected!');
          onUpdate();
        }
      });
    });
}

    // ─── iCal / Calendar helpers ──────────────────────────────────────────────
    function toIcalDT(date, time) {
      const [y,m,d] = date.split('-');
      const [h,mi]  = (time||'09:00').split(':');
      return `${y}${m}${d}T${h}${mi}00`;
    }
    function makeICS(appt, patName, clinic) {
      const s = toIcalDT(appt.date, appt.time);
      const [sh] = (appt.time||'09:00').split(':').map(Number);
      const eh   = String(sh+1).padStart(2,'0');
      const mi   = (appt.time||'09:00').split(':')[1]||'00';
      const e    = toIcalDT(appt.date, `${eh}:${mi}`);
      const uid  = `dp-${appt.id||Date.now()}@dentalpro`;
      const now  = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15);
      return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//DentalPro//EN',
        'CALSCALE:GREGORIAN','METHOD:PUBLISH','BEGIN:VEVENT',
        `UID:${uid}`,`DTSTAMP:${now}Z`,`DTSTART:${s}`,`DTEND:${e}`,
        `SUMMARY:${appt.purpose} – ${patName}`,
        `DESCRIPTION:${appt.notes||''}`,
        `LOCATION:${clinic||'Dental Clinic'}`,
        'STATUS:CONFIRMED','END:VEVENT','END:VCALENDAR'].join('\r\n');
    }
    function dlICS(appt, patName, clinic) {
      const blob = new Blob([makeICS(appt,patName,clinic)],{type:'text/calendar;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `appt_${appt.date}_${patName.replace(/\s+/g,'_')}.ics`;
      a.click();
    }
    function gCalURL(appt, patName, clinic) {
      const s = toIcalDT(appt.date, appt.time);
      const [sh] = (appt.time||'09:00').split(':').map(Number);
      const eh = String(sh+1).padStart(2,'0');
      const mi = (appt.time||'09:00').split(':')[1]||'00';
      const e  = toIcalDT(appt.date, `${eh}:${mi}`);
      return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
        +`&text=${encodeURIComponent(appt.purpose+' – '+patName)}`
        +`&dates=${s}/${e}`
        +`&details=${encodeURIComponent(appt.notes||'')}`
        +`&location=${encodeURIComponent(clinic||'Dental Clinic')}`;
    }
    function olURL(appt, patName, clinic) {
      const si = `${appt.date}T${appt.time||'09:00'}:00`;
      const [sh] = (appt.time||'09:00').split(':').map(Number);
      const eh = String(sh+1).padStart(2,'0');
      const mi = (appt.time||'09:00').split(':')[1]||'00';
      const ei = `${appt.date}T${eh}:${mi}:00`;
      return 'https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent'
        +`&subject=${encodeURIComponent(appt.purpose+' – '+patName)}`
        +`&startdt=${encodeURIComponent(si)}&enddt=${encodeURIComponent(ei)}`
        +`&body=${encodeURIComponent(appt.notes||'')}`
        +`&location=${encodeURIComponent(clinic||'Dental Clinic')}`;
    }

    // ─── Notification helpers ─────────────────────────────────────────────────
    // Permission is read from Notification.permission directly — it's always
    // up-to-date from the browser and doesn't need localStorage.
    function getNotifPerm() {
      if (!('Notification' in window)) return 'unsupported';
      return Notification.permission; // 'default' | 'granted' | 'denied'
    }
    async function askNotifPerm() {
      if (!('Notification' in window)) return 'unsupported';
      if (Notification.permission === 'granted') return 'granted';
      // Must be called from a user gesture
      const r = await Notification.requestPermission();
      return r;
    }
    function fireNotif(title, body) {
      if (getNotifPerm() !== 'granted') return;
      try {
        const n = new Notification(title, {
          body,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="80">🦷</text></svg>',
          tag: 'dp-appt',
          requireInteraction: true,
        });
        n.onclick = () => { window.focus(); n.close(); };
      } catch(e) { console.warn('Notification failed:', e); }
    }

    // Global timer registry — persists across component re-renders
    window._dpTimers = window._dpTimers || {};
    function clearAllTimers() {
      Object.values(window._dpTimers).forEach(clearTimeout);
      window._dpTimers = {};
    }
    function scheduleApptNotifs(appt, patName) {
      // Only schedule if permission is granted
      if (getNotifPerm() !== 'granted') return;
      // Clear existing timers for this appointment
      [0,10,30,60,1440].forEach(m => {
        const key = `${appt.id}_${m}`;
        if (window._dpTimers[key]) { clearTimeout(window._dpTimers[key]); delete window._dpTimers[key]; }
      });
      const offsets = [24*60, 60, 30, 10, 0]; // minutes before appointment
      offsets.forEach(mins => {
        const apptMs = new Date(`${appt.date}T${appt.time||'09:00'}:00`).getTime();
        const fireAt = apptMs - mins * 60000;
        const delay  = fireAt - Date.now();
        // Skip if already passed, but allow up to 30s slack for "now" notifications
        if (mins===0 && delay < -30000) return;
        if (mins>0  && delay < 0) return;
        const actualDelay = Math.max(0, delay);
        const label = mins===0?'is NOW':mins===10?'in 10 minutes':mins===30?'in 30 minutes':mins===60?'in 1 hour':'in 24 hours';
        const tid = setTimeout(() => {
          fireNotif(
            `🦷 Appointment ${label}`,
            `${appt.purpose}\nPatient: ${patName}\n${appt.date} at ${fmtTime(appt.time)}`
          );
        }, actualDelay);
        window._dpTimers[`${appt.id}_${mins}`] = tid;
      });
    }
    function registerAllNotifs(patients) {
      if (getNotifPerm() !== 'granted') return;
      clearAllTimers();
      patients.forEach(p => {
        (p.appointments||[])
          .filter(a => a.status==='Scheduled' && a.date >= today())
          .forEach(a => scheduleApptNotifs(a, p.name));
      });
    }

// ─── helpers ──────────────────────────────────────────────────────────────────
function genCode() { return `PT${new Date().getFullYear().toString().slice(-2)}-${Math.floor(1000+Math.random()*9000)}`; }
function today() { return new Date().toISOString().slice(0,10); }
function fmt(n) { return Number(n||0).toLocaleString("en-EG"); }
function fmtTime(t) { if(!t)return""; const [h,m]=t.split(":"); const hr=parseInt(h); return `${hr%12||12}:${m} ${hr>=12?"PM":"AM"}`; }
function titleCase(str) { return str.replace(/\b\w/g, c => c.toUpperCase()); }
function calcAge(dob) {
  if (!dob) return { years: 0, months: 0, display: "" };
  const birth = new Date(dob);
  const now = new Date();
  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  if (now.getDate() < birth.getDate()) months--;
  if (months < 0) { years--; months += 12; }
  if (years < 0) return { years: 0, months: 0, display: "" };
  const display = years > 0
    ? (months > 0 ? `${years} yr ${months} mo` : `${years} yr`)
    : (months > 0 ? `${months} mo` : "");
  return { years, months, display };
}

function ToothSVG({ num, quad, cond, size=36, onClick }) {
  const c = CONDITIONS[cond]||CONDITIONS.healthy;
  const isUp = quad==="UR"||quad==="UL";
  const isMolar = num>=5;
  const cx=size/2,cy=size/2,w=isMolar?size*.7:size*.55,h=size*.45,rx=isMolar?4:6;
  const sym = quad==="UR"?`${num}⌐`:quad==="UL"?`⌐${num}`:quad==="LR"?`${num}¬`:`¬${num}`;
  return (
    <div onClick={onClick} title={`${sym} – ${c.label}`} style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",userSelect:"none",gap:1}}>
      <span style={{fontSize:9,color:"#666",fontFamily:"monospace",lineHeight:1}}>{sym}</span>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <line x1={cx} y1={isUp?cy+h/2:cy-h/2} x2={cx} y2={isUp?cy+h/2+8:cy-h/2-8} stroke={c.stroke} strokeWidth="1.5" strokeDasharray="2,1"/>
        <rect x={cx-w/2} y={cy-h/2} width={w} height={h} rx={rx} fill={c.fill} stroke={c.stroke} strokeWidth="1.5"/>
        {isMolar&&<><line x1={cx-w/4} y1={cy-h/2} x2={cx-w/4} y2={cy+h/2} stroke={c.stroke} strokeWidth=".5" opacity=".5"/><line x1={cx+w/4} y1={cy-h/2} x2={cx+w/4} y2={cy+h/2} stroke={c.stroke} strokeWidth=".5" opacity=".5"/></>}
        {(cond==="missing"||cond==="extracted")&&<><line x1={cx-6} y1={cy-6} x2={cx+6} y2={cy+6} stroke={c.stroke} strokeWidth="1.5"/><line x1={cx+6} y1={cy-6} x2={cx-6} y2={cy+6} stroke={c.stroke} strokeWidth="1.5"/></>}
        {cond==="crown"&&<circle cx={cx} cy={cy} r={4} fill="none" stroke={c.stroke} strokeWidth="1.5"/>}
        {cond==="implant"&&<text x={cx} y={cy+4} textAnchor="middle" fontSize="10" fill={c.text} fontWeight="bold">I</text>}
        {cond==="filled"&&<path d={`M ${cx-w/2+3} ${cy} L ${cx+w/2-3} ${cy}`} stroke={c.stroke} strokeWidth="2"/>}
      </svg>
    </div>
  );
}
function DecToothSVG({ letter, quad, cond, size=30, onClick }) {
  const c = CONDITIONS[cond]||CONDITIONS.healthy;
  const isUp = quad==="UR"||quad==="UL";
  const cx=size/2,cy=size/2;
  const sym = quad==="UR"?`${letter}⌐`:quad==="UL"?`⌐${letter}`:quad==="LR"?`${letter}¬`:`¬${letter}`;
  return (
    <div onClick={onClick} title={`${sym} – ${c.label}`} style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",gap:1}}>
      <span style={{fontSize:8,color:"#777",fontFamily:"monospace",lineHeight:1}}>{sym}</span>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <line x1={cx} y1={isUp?cy+8:cy-8} x2={cx} y2={isUp?cy+13:cy-13} stroke={c.stroke} strokeWidth="1" strokeDasharray="2,1"/>
        <rect x={cx-8} y={cy-7} width={16} height={14} rx={5} fill={c.fill} stroke={c.stroke} strokeWidth="1.5"/>
        <text x={cx} y={cy+4} textAnchor="middle" fontSize="9" fill={c.text} fontWeight="500">{letter}</text>
        {(cond==="missing"||cond==="extracted")&&<><line x1={cx-5} y1={cy-4} x2={cx+5} y2={cy+4} stroke={c.stroke} strokeWidth="1.5"/><line x1={cx+5} y1={cy-4} x2={cx-5} y2={cy+4} stroke={c.stroke} strokeWidth="1.5"/></>}
      </svg>
    </div>
  );
}

function exportCSV(patients) {
  const rows = [["Code","Age","Gender","Phone","Email","Chief Complaint","Medical Conditions","Allergies","Medications","Smoking","Alcohol","Dental Notes","Procedure Date","Procedure","Tooth","Cost","Status","Appointment Date","Appointment Purpose","Appointment Status","Image Type","Image Description","Ortho Total","Ortho Paid","Ortho Balance","Material Expenses","Lab Expenses"].join(",")];
  patients.forEach(p=>{
    const mh=p.medHist||{};
    const base=[p.code,p.age||"",p.gender||"",p.phone||"",p.email||"",`"${(p.chiefComplaint||"").replace(/"/g,'""')}"`,`"${(mh.conditions||[]).join("; ")}"`,`"${(mh.allergies||[]).join("; ")}"`,`"${(mh.medications||[]).join("; ")}"`,mh.smoking||"",mh.alcohol||"",`"${(p.dentalNotes||"").replace(/"/g,'""')}"`];
    if(!(p.procedures||[]).length&&!(p.appointments||[]).length) rows.push([...base,"","","","","","","","","","",p.ortho?.totalAmount||"",p.ortho?.totalPaid||"",p.ortho?.balance||"","",""].join(","));
    (p.procedures||[]).forEach((pr,i)=>rows.push([...base,pr.date||"",`"${(pr.procedure||"").replace(/"/g,'""')}"`,pr.tooth||"",pr.cost||"",pr.status||"","","","","","",i===0?(p.ortho?.totalAmount||""):"",i===0?(p.ortho?.totalPaid||""):"",i===0?(p.ortho?.balance||""):"","",""].join(",")));
    (p.appointments||[]).forEach(a=>rows.push([...base,"","","","","",a.date||"",`"${(a.purpose||"").replace(/"/g,'""')}"`,a.status||"","","","","","","",""].join(",")));
  });
  const blob=new Blob([rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`dental_records_${today()}.csv`;a.click();
}

// ── Theme CSS variables injected dynamically ──────────────────────────────────
function applyTheme(dark) {
  const root = document.documentElement;
  const body = document.body;

  if (dark) {
    // ── Deep professional dark palette ─────────────────────────────────────
    body.style.background   = '#0a0c14';
    body.style.color        = '#dde1f5';

    // Inject global dark overrides via a style tag
    let st = document.getElementById('dp-theme');
    if (!st) { st = document.createElement('style'); st.id='dp-theme'; document.head.appendChild(st); }
    st.textContent = `
      * { box-sizing: border-box; }
      body { background: #0a0c14 !important; color: #dde1f5 !important; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width:6px; height:6px; }
      ::-webkit-scrollbar-track { background:#0d1020; }
      ::-webkit-scrollbar-thumb { background:#2a3060; border-radius:4px; }
      ::-webkit-scrollbar-thumb:hover { background:#3d4fa8; }

      /* ── Cards / Sections ── */
      div[data-card], section {
        background: #12162a !important;
        border-color: #1e2545 !important;
        color: #dde1f5 !important;
      }

      /* ── Inputs / Selects / Textareas ── */
      input:not([type=range]):not([type=checkbox]),
      select,
      textarea {
        background: #0e1225 !important;
        color: #c5cae9 !important;
        border-color: #2a3270 !important;
      }
      input::placeholder, textarea::placeholder {
        color: #4a5080 !important;
      }
      input:focus, select:focus, textarea:focus {
        border-color: #5c6bc0 !important;
        box-shadow: 0 0 0 3px rgba(92,107,192,0.18) !important;
        outline: none !important;
      }

      /* ── Labels / small text ── */
      label span, label { color: #8c9ede !important; }

      /* ── Generic white backgrounds → dark ── */
      [style*="background:#fff"],
      [style*='background:"#fff"'],
      [style*="background: #fff"],
      [style*="background:#fafafa"],
      [style*="background:#f8f9ff"],
      [style*="background:#f5f5f5"],
      [style*="background:#f0f2f8"],
      [style*="background:#f5f8ff"],
      [style*="background:#e8eaf6"] {
        background: #12162a !important;
      }

      /* ── Text colour overrides ── */

      [style*="color:#555"],
      [style*="color:#666"],
      [style*="color:#777"],
      [style*="color:#888"],
      [style*="color:#999"],
      [style*="color:#1a237e"],

        border-color: #1e2545 !important;
      }

      /* ── Headings inside cards ── */
      h2, h3 { color: #90caf9 !important; }

      /* ── Subtle section backgrounds ── */
      [style*="background:#f8f9ff"],
      [style*="background:#fafafa"] {
        background: #0e1225 !important;
      }

      /* ── Today banner (keep its blue gradient) ── */
      [style*="linear-gradient(90deg,#1a237e"] {
        background: linear-gradient(90deg,#0d1a5e,#1245a8) !important;
      }

      /* ── Stat cards / summary cards ── */
      [style*="background:#fff"][style*="border-radius:12"],
      [style*="background:#fff"][style*="border-radius:10"],
      [style*="background:#fff"][style*="border-radius:8"] {

      button[style*="background:"#f5f5f5""],
      button[style*='background:"#f5f5f5"'] {
        background: #1a1f38 !important;
        color: #9fa8da !important;
      }

      /* ── delete button ── */
      button[style*="background:#fce4ec"] {
        background: #2a1020 !important;
        border-color: #7f2a40 !important;
        color: #f48fb1 !important;
      }

      /* ── Procedure history rows ── */
      div[style*="background:#fafafa"][style*="border-radius:8"] {
        background: #0e1225 !important;
      }

      /* ── finance stat cards ── */
      div[style*="background:#fff"][style*="border-radius:12"][style*="flex:1"] {

      }

      /* ── modal backdrops keep their overlay ── */

      div[style*="rgba(0,0,0,0.6"],
      div[style*="rgba(0,0,0,0.8"] { /* keep as-is */ }

      div[style*="background:#e8eaf6"][style*="height:110"],
      div[style*="background:#e8eaf6"][style*="height:100"] {
        background: #1a1f38 !important;
      }
    `;
  } else {
    // ── Light mode: remove dark overrides ─────────────────────────────────
    body.style.background = '';
    body.style.color      = '';
    const st = document.getElementById('dp-theme');
    if (st) st.textContent = `
      * { box-sizing: border-box; }
      ::-webkit-scrollbar { width:6px; height:6px; }
      ::-webkit-scrollbar-track { background:#f0f2f8; }
      ::-webkit-scrollbar-thumb { background:#c5cae9; border-radius:4px; }
      ::-webkit-scrollbar-thumb:hover { background:#9fa8da; }
    `;
  }
}

function LoginPage({ dentists, onLogin }) {
  const [selId, setSelId]   = React.useState(dentists.length===1 ? dentists[0].id : null);

  const dentist = dentists.find(d => d.id === selId);

  function attempt() {
    if (!dentist) { setErr('Please select a dentist first.'); return; }

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {dentists.map(d => (
                <div key={d.id} onClick={()=>{setSelId(d.id);setU('');setP('');setErr('');}}

                  <div style={{width:40,height:40,borderRadius:'50%',background:selId===d.id?'#1565c0':'#bbb',

                  <div style={{fontSize:10,color:'#888'}}>{d.clinicName}</div>

          <div style={{display:'flex',flexDirection:'column',gap:12}}>

              Signing in as Dr. {dentist.name} — {dentist.clinicName}
            </div>}
            <label style={S.lbl}>Username
              <input value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&attempt()}
                autoFocus style={{...S.inp,padding:'10px 14px',fontSize:14}} placeholder='Enter username'/>
            </label>
            <label style={S.lbl}>Password
              <div style={{position:'relative'}}>
                <input type={showP?'text':'password'} value={p} onChange={e=>setP(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&attempt()}

// ── Dentist Setup Page (first-run or adding new dentist) ──────────────────────
function DentistSetupPage({ existingDentists, maxDentists, onSave, onCancel }) {
  const [form, setForm] = React.useState({
    name:'', clinicName:'', specialty:'General Dentistry',
    phone:'', email:'', address:'', username:'', password:'', confirmPassword:''
  });
  const [showP, setShowP] = React.useState(false);
  const [err, setErr]     = React.useState('');

  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  function save() {
    if (!form.name||!form.clinicName||!form.username||!form.password)
      return setErr('Name, Clinic, Username and Password are required.');
    if (form.password !== form.confirmPassword)
      return setErr('Passwords do not match.');
    if (form.username.length < 4)
      return setErr('Username must be at least 4 characters.');
    if (form.password.length < 6)
      return setErr('Password must be at least 6 characters.');
    if (existingDentists.some(d=>d.username===form.username))
      return setErr('Username already taken. Choose another.');
    const newDentist = {
      id: Date.now(),
      name: form.name, clinicName: form.clinicName,
      specialty: form.specialty, phone: form.phone,
      email: form.email, address: form.address,
      username: form.username, password: form.password
    };
    onSave(newDentist);
  }

  const fields = [
    ['name',        'Full Name (Dr. ...)',   'text'],
    ['clinicName',  'Clinic Name',           'text'],
    ['phone',       'Phone Number',          'text'],
    ['email',       'Email',                 'email'],
    ['address',     'Clinic Address',        'text'],
  ];

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'linear-gradient(135deg,#0d1030,#1a237e,#1565c0)',padding:'2rem'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'2rem 2rem',width:'min(560px,96vw)',
        boxShadow:'0 24px 80px rgba(0,0,0,0.45)',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
          <div style={{fontSize:44}}>👨‍⚕️</div>
          <h2 style={{margin:'8px 0 4px',color:'#1a237e'}}>
            {existingDentists.length===0 ? 'Welcome to DentalPro!' : 'Add New Dentist'}
          </h2>
          <p style={{color:'#888',fontSize:13,margin:0}}>
            {existingDentists.length===0
              ? 'Set up your profile to get started'
              : `Dentist ${existingDentists.length+1} of ${maxDentists}`}
          </p>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          {fields.map(([k,l,t])=>(
            <label key={k} style={{...S.lbl,gridColumn:k==='address'?'span 2':'auto'}}>
              {l}
              <input type={t} value={form[k]} onChange={e=>upd(k,e.target.value)} style={S.inp} placeholder={l}/>
            </label>
          ))}
          <label style={S.lbl}>Specialty
            <select value={form.specialty} onChange={e=>upd('specialty',e.target.value)} style={S.inp}>
              {['General Dentistry','Orthodontics','Endodontics','Periodontics','Oral Surgery',
                'Prosthodontics','Pediatric Dentistry','Oral Medicine'].map(s=><option key={s}>{s}</option>)}
            </select>
          </label>
        </div>

        <div style={{borderTop:'2px solid #e8eaf6',paddingTop:14,marginTop:4}}>
          <div style={{fontSize:12,fontWeight:700,color:'#1a237e',marginBottom:10}}>🔐 Login Credentials</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <label style={S.lbl}>Username (min 4 chars)
              <input value={form.username} onChange={e=>upd('username',e.target.value)} style={S.inp}/>
            </label>
            <div/>
            <label style={S.lbl}>Password (min 6 chars)
              <div style={{position:'relative'}}>
                <input type={showP?'text':'password'} value={form.password} onChange={e=>upd('password',e.target.value)}
                  style={{...S.inp,paddingRight:36}}/>

                  {showP?'🙈':'👁️'}
                </button>
              </div>
            </label>
            <label style={S.lbl}>Confirm Password
              <input type={showP?'text':'password'} value={form.confirmPassword} onChange={e=>upd('confirmPassword',e.target.value)} style={S.inp}/>
            </label>
          </div>
        </div>

        {err && <div style={{background:'#fce4ec',color:'#c62828',borderRadius:8,padding:'8px 12px',fontSize:13,marginTop:10}}>{err}</div>}

        <div style={{display:'flex',gap:8,marginTop:16}}>
          <button onClick={save} style={{...S.btn('#1a237e'),flex:1,justifyContent:'center',padding:'11px'}}>
            {existingDentists.length===0 ? '🚀 Create Profile & Start' : '➕ Add Dentist'}
          </button>
          {onCancel && <button onClick={onCancel} style={S.btn('#757575')}>Cancel</button>}
        </div>
      </div>
    </div>
  );
}

function PatientsPage({ patients, setPatients, onNavigate }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editPatient, setEditPatient] = useState(null);
  const [search, setSearch] = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const [selectedPatientId, setSelectedPatientId] = useState(null);
  const [profilePatient, setProfilePatient] = useState(null);
  const clickTimerRef = useRef(null);
  const emptyForm = {name:"",age:"",gender:"Male",phone:"",email:"",address:"",emergencyContact:"",dob:"",chiefComplaint:""};
  const [form, setForm] = useState(emptyForm);

  const todayAppts = patients.flatMap(p=>
    (p.appointments||[]).filter(a=>a.date===today()&&a.status==="Scheduled").map(a=>({...a,patientName:p.name,patientCode:p.code,patientId:p.id}))
  ).sort((a,b)=>a.time<b.time?-1:1);

  const filtered = patients.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.code.toLowerCase().includes(search.toLowerCase()));

  function addPatient() {
    if (!form.name) return;
    const ageVal = form.dob ? calcAge(form.dob).years : (parseInt(form.age)||0);
    const np = { id:Date.now(), code:genCode(), ...form, age:ageVal,
      medHist:{conditions:[],allergies:[],medications:[],smoking:"Never",alcohol:"Never",otherConditions:"",otherAllergies:"",otherMedications:"",otherHabits:"",anesthesiaReaction:"",bleedingHistory:"",healingHistory:"",bp:"",hr:"",rr:"",temp:"",height:"",weight:"",pregnant:false,nursing:false,betelQuid:false,additionalNotes:""},
      dentalNotes:"",dentalChart:{},procedures:[],appointments:[],images:[],
      ortho:{totalAmount:0,payments:[],notes:""},finances:{materialExpenses:[],labExpenses:[]} };
    setPatients(prev=>[...prev,np]);
    setShowAdd(false); setForm(emptyForm);
  }

  function saveEdit() {
    if (!form.name) return;
    const ageVal = form.dob ? calcAge(form.dob).years : (parseInt(form.age)||0);
    setPatients(prev=>prev.map(p=>p.id===editPatient.id?{...p,...form,age:ageVal}:p));
    setEditPatient(null); setForm(emptyForm);
  }

  function deletePatient(id) {
    setPatients(prev=>prev.filter(p=>p.id!==id));
    setConfirmDel(null);
  }

  function openEdit(p) {
    setEditPatient(p);
    setForm({name:p.name,age:p.age||"",gender:p.gender||"Male",phone:p.phone||"",email:p.email||"",address:p.address||"",emergencyContact:p.emergencyContact||"",dob:p.dob||"",chiefComplaint:p.chiefComplaint||""});
    setShowAdd(false);
  }

  const patientForm = (onSave, onCancel, title) => {
    const ageInfo = calcAge(form.dob);
    return (
    <div style={{...S.card,marginBottom:"1rem",background:"#f5f8ff",border:"1px solid #c5cae9"}}>
      <h3 style={{margin:"0 0 .75rem",fontSize:15,fontWeight:600,color:"#1a237e"}}>{title}</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:9}}>
        {/* Name – auto title-case */}
        <label style={S.lbl}>Full Name
          <input type="text" value={form.name||""} onChange={e=>setForm(p=>({...p,name:titleCase(e.target.value)}))} style={S.inp} placeholder="e.g. Ahmed Hassan"/>
        </label>
        {/* DOB – auto-calculates age */}
        <label style={S.lbl}>Date of Birth
          <input type="date" value={form.dob||""} onChange={e=>{
            const dob=e.target.value;
            const ag=calcAge(dob);
            setForm(p=>({...p,dob,age:ag.years}));
          }} style={S.inp}/>
          {ageInfo.display&&<span style={{fontSize:11,color:"#1565c0",fontWeight:600,marginTop:2}}>📅 {ageInfo.display} old</span>}
        </label>
        {/* Age – read-only if DOB filled */}
        <label style={S.lbl}>Age (years)
          <input type="number" value={form.age||""} onChange={e=>setForm(p=>({...p,age:e.target.value}))}
            style={{...S.inp, background: form.dob ? "#e8f5e9" : "#fafafa"}}
            placeholder="Auto from DOB" readOnly={!!form.dob}/>
        </label>
        {[["phone","Phone"],["email","Email"],["address","Address"],["emergencyContact","Emergency Contact"]].map(([k,l])=>(
          <label key={k} style={S.lbl}>{l}<input type="text" value={form[k]||""} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} style={S.inp}/></label>
        ))}
        <label style={S.lbl}>Gender<select value={form.gender} onChange={e=>setForm(p=>({...p,gender:e.target.value}))} style={S.inp}><option>Male</option><option>Female</option></select></label>
      </div>
      {/* Chief Complaint – larger professional textarea */}
      <label style={{...S.lbl,marginTop:10}}>Chief Complaint
        <textarea value={form.chiefComplaint||""} onChange={e=>setForm(p=>({...p,chiefComplaint:e.target.value}))}
          rows={3} style={{...S.ta,minHeight:72,lineHeight:1.5,fontSize:13}}
          placeholder="Describe the patient's main reason for visit…"/>
      </label>
      <div style={{marginTop:".75rem",display:"flex",gap:8}}>
        <button onClick={onSave} style={S.btn("#2e7d32")}>Save Patient</button>
        <button onClick={onCancel} style={S.btn("#757575")}>Cancel</button>
      </div>
    </div>
  );};

  return (
    <div style={{padding:"1.5rem"}}>
      {/* ── Today's Schedule Banner ── */}
      {todayAppts.length>0&&(
        <div style={{background:"linear-gradient(90deg,#1a237e,#1565c0)",borderRadius:12,padding:"1rem 1.25rem",marginBottom:"1.25rem",color:"#fff"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:18}}>📅</span>
            <span style={{fontWeight:700,fontSize:15}}>Today's Schedule — {new Date().toLocaleDateString("en-EG",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</span>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {todayAppts.map((a,i)=>(
              <div key={i} onClick={()=>onNavigate(a.patientId,"appointments")} style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 14px",cursor:"pointer",border:"1px solid rgba(255,255,255,0.25)",backdropFilter:"blur(4px)"}}>
                <div style={{fontWeight:700,fontSize:13}}>{fmtTime(a.time)} — {a.patientName}</div>
                <div style={{fontSize:11,opacity:.85,marginTop:2}}>{a.purpose}</div>
                {a.notes&&<div style={{fontSize:10,opacity:.7,marginTop:1}}>{a.notes}</div>}
                <div style={{fontSize:9,opacity:.6,fontFamily:"monospace",marginTop:2}}>{a.patientCode}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:600,color:"#1a237e"}}>Patient Registry</h2>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>exportCSV(patients)} style={S.btn("#1565c0")}><i className="ti ti-download"/>Export CSV</button>
          <button onClick={()=>{setShowAdd(true);setEditPatient(null);setForm(emptyForm);}} style={S.btn("#2e7d32")}><i className="ti ti-plus"/>Add Patient</button>
        </div>
      </div>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or code…" style={{...S.inp,marginBottom:"1rem",maxWidth:320}}/>

      {showAdd && patientForm(addPatient, ()=>setShowAdd(false), "New Patient")}
      {editPatient && patientForm(saveEdit, ()=>setEditPatient(null), `Edit — ${editPatient.name}`)}

      <div style={{marginBottom:8,fontSize:12,color:"#888"}}>
        💡 <strong>Single click</strong> to select a patient · <strong>Double click</strong> to open full profile
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        {filtered.map(p=>{
          const todayCount=(p.appointments||[]).filter(a=>a.date===today()&&a.status==="Scheduled").length;
          const isSelected = selectedPatientId === p.id;
          const ageInfo = calcAge(p.dob);

          function handleCardClick(e) {
            // Ignore clicks on buttons
            if (e.target.closest("button")) return;
            if (clickTimerRef.current) {
              // Double click
              clearTimeout(clickTimerRef.current);
              clickTimerRef.current = null;
              setProfilePatient(p);
            } else {
              // Single click — wait to see if double
              setSelectedPatientId(p.id);
              onNavigate(p.id, null);
              clickTimerRef.current = setTimeout(() => {
                clickTimerRef.current = null;
              }, 280);
            }
          }

          return (
            <div key={p.id} onClick={handleCardClick} style={{
              ...S.card,
              border: isSelected ? "2px solid #1565c0" : "2px solid #e0e0e0",
              position:"relative", cursor:"pointer",
              boxShadow: isSelected ? "0 0 0 4px rgba(21,101,192,0.12), 0 2px 12px rgba(21,101,192,0.15)" : "none",
              transition:"box-shadow .15s, border-color .15s"
            }}>
              {/* Selected indicator */}
              {isSelected&&<div style={{position:"absolute",top:0,left:0,bottom:0,width:4,background:"#1565c0",borderRadius:"12px 0 0 12px"}}/>}
              {/* Edit / Delete */}
              <div style={{position:"absolute",top:10,right:10,display:"flex",gap:5}}>
                <button onClick={e=>{e.stopPropagation();openEdit(p);}} style={{background:"#e3f2fd",color:"#1565c0",border:"1px solid #90caf9",borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:600,cursor:"pointer"}}>✏️</button>
                <button onClick={e=>{e.stopPropagation();setConfirmDel(p);}} style={S.delbtn}>🗑</button>
              </div>
              <div style={{paddingRight:70}}>
                <div style={{fontWeight:700,fontSize:15,color:isSelected?"#1565c0":"#1a237e"}}>{p.name}</div>
                <div style={{fontSize:11,color:"#1565c0",fontFamily:"monospace",marginTop:2}}>{p.code}</div>
                <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4,flexWrap:"wrap"}}>
                  <span style={S.badge("#e3f2fd","#0d47a1")}>{p.gender}</span>
                  {ageInfo.display&&<span style={{...S.badge("#f3e5f5","#6a1b9a"),fontSize:10}}>🎂 {ageInfo.display}</span>}
                  {todayCount>0&&<span style={{...S.badge("#fff9c4","#f57f17"),fontSize:10}}>📅 {todayCount} today</span>}
                </div>
              </div>
              <div style={{marginTop:7,fontSize:12,color:"#555"}}>{p.phone}</div>
              <div style={{fontSize:12,color:"#777"}}>{p.email}</div>
              {p.chiefComplaint&&<div style={{marginTop:6,fontSize:12,color:"#e65100",background:"#fff3e0",padding:"4px 10px",borderRadius:6,lineHeight:1.4}}>{p.chiefComplaint}</div>}
              {isSelected&&(
                <div style={{marginTop:9,display:"flex",flexWrap:"wrap",gap:5,borderTop:"1px solid #e8eaf6",paddingTop:8}}>
                  {[["📋","History","history","#1565c0"],["🦷","Procedures","procedures","#2e7d32"],["📅","Appts","appointments","#6a1b9a"],["📷","X-Rays","xrays","#00695c"],["🦷","Ortho","ortho","#b71c1c"],["💰","Finances","finances","#e65100"]].map(([icon,lbl,pg,bg])=>(
                    <button key={pg} onClick={e=>{e.stopPropagation();onNavigate(p.id,pg);}} style={{...S.sbtn(bg),display:"flex",alignItems:"center",gap:3}}>{icon} {lbl}</button>
                  ))}
                  <button onClick={e=>{e.stopPropagation();setProfilePatient(p);}} style={{...S.sbtn("#455a64"),display:"flex",alignItems:"center",gap:3}}>👤 Full Profile</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {confirmDel&&<ConfirmDelete
        message={`Delete patient "${confirmDel.name}" (${confirmDel.code})? This will permanently remove all their records.`}
        onConfirm={()=>deletePatient(confirmDel.id)}
        onCancel={()=>setConfirmDel(null)}
      />}
      {profilePatient&&<PatientProfileModal patient={profilePatient} onClose={()=>setProfilePatient(null)} onNavigate={onNavigate}/>}
    </div>
  );
}

// ─── HISTORY PAGE ─────────────────────────────────────────────────────────────
function HistoryPage({ patient, onSave, unsaved, setUnsaved, externalSetD }) {
  const MED_CONDITIONS = ["Hypertension","Heart Disease","Diabetes Mellitus","Asthma","COPD","Liver Disease","Kidney Disease","Thyroid Disorder","Autoimmune Disorder","HIV/AIDS","Hepatitis B","Hepatitis C","Tuberculosis","Cancer","Bleeding Disorder","Epilepsy"];
  const ALLERGIES = ["Penicillin","Amoxicillin","Cephalosporin","Sulfa","Aspirin","Ibuprofen","Codeine","Local Anesthetic","Latex","Nickel"];
  const MEDICATIONS_LIST = ["Anticoagulant Therapy","Antiplatelet Therapy","Bisphosphonate Therapy","Immunosuppressive Therapy","Chemotherapy","Radiation Therapy","Corticosteroids","Insulin","Oral Hypoglycemic","Antihypertensive"];

  const [d, setD] = useState(null);
  const [chart, setChart] = useState({});
  const [flash, setFlash] = useState(false);
  const [otherOpen, setOtherOpen] = useState({});
  const [otherText, setOtherText] = useState({});

  // ── Expose setD to parent (HistoryPageWithAI) so voice can inject data ──
  useEffect(() => {
    if (externalSetD) externalSetD(setD);
  }, [externalSetD, d]);

  useEffect(()=>{
    if (!patient) return;
    const mh = patient.medHist||{};
    setD({
      chiefComplaint:patient.chiefComplaint||"",
      conditions:mh.conditions||[], allergies:mh.allergies||[], medications:mh.medications||[],
      otherConditions:mh.otherConditions||"", otherAllergies:mh.otherAllergies||"",
      otherMedications:mh.otherMedications||"", otherHabits:mh.otherHabits||"",
      smoking:mh.smoking||"Never", alcohol:mh.alcohol||"Never",
      bp:mh.bp||"",hr:mh.hr||"",rr:mh.rr||"",temp:mh.temp||"",height:mh.height||"",weight:mh.weight||"",
      pregnant:mh.pregnant||false, nursing:mh.nursing||false, betelQuid:mh.betelQuid||false, trimester:mh.trimester||"",
      anesthesiaReaction:mh.anesthesiaReaction||"", bleedingHistory:mh.bleedingHistory||"",
      healingHistory:mh.healingHistory||"", additionalNotes:mh.additionalNotes||"",
      dentalNotes:patient.dentalNotes||"",
    });
    setChart({...(patient.dentalChart||{})});
    setOtherOpen({});
    setOtherText({});
    setUnsaved(false);
  },[patient?.id]);

  function upd(k,v){setD(p=>({...p,[k]:v}));setUnsaved(true);}
  function toggleArr(k,v){setD(p=>({...p,[k]:p[k].includes(v)?p[k].filter(x=>x!==v):[...p[k],v]}));setUnsaved(true);}

  function save(){
    onSave({
      chiefComplaint:d.chiefComplaint,
      medHist:{conditions:d.conditions,allergies:d.allergies,medications:d.medications,
        otherConditions:d.otherConditions,otherAllergies:d.otherAllergies,
        otherMedications:d.otherMedications,otherHabits:d.otherHabits,
        smoking:d.smoking,alcohol:d.alcohol,bp:d.bp,hr:d.hr,rr:d.rr,temp:d.temp,
        height:d.height,weight:d.weight,pregnant:d.pregnant,nursing:d.nursing,betelQuid:d.betelQuid,
        trimester:d.trimester,anesthesiaReaction:d.anesthesiaReaction,
        bleedingHistory:d.bleedingHistory,healingHistory:d.healingHistory,additionalNotes:d.additionalNotes},
      dentalNotes:d.dentalNotes, dentalChart:chart
    });
    setUnsaved(false); setFlash(true); setTimeout(()=>setFlash(false),2000);
  }

  if (!d) return null;

  const ri=(lbl,k,t="text")=>(<label style={S.lbl}>{lbl}<input type={t} value={d[k]} onChange={e=>upd(k,e.target.value)} style={S.inp}/></label>);

  const toggleSection=(arr,items,otherKey,otherPlaceholder)=>{
    // custom items = anything in d[arr] that is NOT in the standard items list
    const customItems = (d[arr]||[]).filter(x => !items.includes(x));
    const isOpen = otherOpen[arr] || false;
    const curText = otherText[arr] || "";

    function addCustom() {
      const v = curText.trim();
      if (!v) return;
      // If already in list, just close; if not, add it and mark it selected
      if (!d[arr].includes(v)) {
        upd(arr, [...(d[arr]||[]), v]);
      }
      setOtherText(t=>({...t,[arr]:""}));
      setOtherOpen(o=>({...o,[arr]:false}));
    }

    return (
      <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
        {/* Standard preset buttons */}
        {items.map(item=>{
          const on=(d[arr]||[]).includes(item);
          return (
            <button key={item} onClick={()=>toggleArr(arr,item)} style={{
              background:on?"#1565c0":"#f5f5f5",
              color:on?"#fff":"#333",
              border:on?"none":"1px solid #e0e0e0",
              borderRadius:20,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:on?600:400,
              transition:"background .15s"
            }}>{item}</button>
          );
        })}
        {/* Custom "other" items – shown as active blue toggle buttons */}
        {customItems.map(item=>(
          <button key={item} onClick={()=>toggleArr(arr,item)} title="Click to remove" style={{
            background:"#1565c0",color:"#fff",
            border:"2px dashed #90caf9",
            borderRadius:20,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600,
            display:"flex",alignItems:"center",gap:4
          }}>
            {item}
            <span style={{fontSize:13,lineHeight:1,opacity:.75}}>×</span>
          </button>
        ))}
        {/* "+ Other" toggle */}
        {!isOpen?(
          <button onClick={()=>setOtherOpen(o=>({...o,[arr]:true}))} style={{
            background:"#f0f4ff",color:"#1565c0",border:"1px dashed #90caf9",
            borderRadius:20,padding:"4px 12px",fontSize:11,cursor:"pointer",fontWeight:600
          }}>+ Other</button>
        ):(
          <div style={{display:"flex",gap:5,alignItems:"center",background:"#e8f0fe",borderRadius:20,padding:"3px 6px 3px 10px",border:"1px solid #90caf9"}}>
            <input
              autoFocus
              value={curText}
              onChange={e=>setOtherText(t=>({...t,[arr]:e.target.value}))}
              onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();addCustom();} if(e.key==="Escape"){setOtherOpen(o=>({...o,[arr]:false}));} }}
              placeholder={otherPlaceholder}
              style={{border:"none",background:"transparent",outline:"none",fontSize:12,color:"#1a237e",width:150,fontWeight:500}}
            />
            <button onClick={addCustom} style={{background:"#1565c0",color:"#fff",border:"none",borderRadius:16,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>Add</button>
            <button onClick={()=>{setOtherOpen(o=>({...o,[arr]:false}));setOtherText(t=>({...t,[arr]:""}));}} style={{background:"none",border:"none",color:"#888",fontSize:16,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{padding:"1.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div><h2 style={{margin:0,fontSize:20,fontWeight:600,color:"#1a237e"}}>{patient.name}</h2>
          <span style={{fontSize:11,color:"#1565c0",fontFamily:"monospace"}}>{patient.code}</span></div>
        {unsaved&&<span style={{...S.badge("#fff3e0","#e65100"),border:"1px solid #ffcc02"}}>● Unsaved changes</span>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>

          <section style={S.card}>
            <h3 style={S.sh}>Chief Complaint</h3>
            <textarea value={d.chiefComplaint} onChange={e=>upd("chiefComplaint",e.target.value)} rows={4} style={{...S.ta,minHeight:90,lineHeight:1.6,fontSize:13}} placeholder="Describe the patient's main reason for visit in detail…"/>
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Vital Signs</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[["bp","Blood Pressure"],["hr","Heart Rate"],["rr","Respiratory Rate"],["temp","Temperature (°C)"],["height","Height (cm)"],["weight","Weight (kg)"]].map(([k,l])=>ri(l,k))}
            </div>
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Medical Conditions</h3>
            {toggleSection("conditions",MED_CONDITIONS,"otherConditions","e.g. Osteoporosis")}
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Drug Allergies</h3>
            {toggleSection("allergies",ALLERGIES,"otherAllergies","e.g. Erythromycin")}
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Current Medications / Therapies</h3>
            {toggleSection("medications",MEDICATIONS_LIST,"otherMedications","e.g. Metformin")}
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Habits</h3>
            <label style={S.lbl}>Smoking Status
              <select value={d.smoking} onChange={e=>upd("smoking",e.target.value)} style={S.inp}>
                {["Never","Former","Current (Light)","Current (Moderate)","Current (Heavy)"].map(o=><option key={o}>{o}</option>)}
              </select>
            </label>
            <label style={{...S.lbl,marginTop:8}}>Alcohol Consumption
              <select value={d.alcohol} onChange={e=>upd("alcohol",e.target.value)} style={S.inp}>
                {["Never","Social","Moderate","Heavy"].map(o=><option key={o}>{o}</option>)}
              </select>
            </label>
            <div style={{marginTop:8,display:"flex",gap:16,alignItems:"center"}}>
              <label style={{display:"flex",gap:5,alignItems:"center",fontSize:13,cursor:"pointer"}}>
                <input type="checkbox" checked={d.betelQuid} onChange={e=>upd("betelQuid",e.target.checked)}/> Betel Quid
              </label>
            </div>
            <div style={{marginTop:8}}>
              <div style={{fontSize:12,color:"#555",fontWeight:500,marginBottom:4}}>Other Habits</div>
              <input value={d.otherHabits} onChange={e=>upd("otherHabits",e.target.value)} style={S.inp} placeholder="e.g. nail biting, pen chewing…"/>
            </div>
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Pregnancy Status</h3>
            <div style={{display:"flex",gap:16}}>
              <label style={{display:"flex",gap:5,alignItems:"center",fontSize:13,cursor:"pointer"}}><input type="checkbox" checked={d.pregnant} onChange={e=>upd("pregnant",e.target.checked)}/> Pregnant</label>
              <label style={{display:"flex",gap:5,alignItems:"center",fontSize:13,cursor:"pointer"}}><input type="checkbox" checked={d.nursing} onChange={e=>upd("nursing",e.target.checked)}/> Nursing</label>
            </div>
            {d.pregnant&&(<label style={{...S.lbl,marginTop:8}}>Trimester<select value={d.trimester} onChange={e=>upd("trimester",e.target.value)} style={S.inp}><option value="">Select</option><option>First</option><option>Second</option><option>Third</option></select></label>)}
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Additional Medical History</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[["anesthesiaReaction","Previous Reaction to Dental Anesthesia"],["bleedingHistory","History of Prolonged Bleeding"],["healingHistory","History of Prolonged Healing"]].map(([k,l])=>ri(l,k))}
              <label style={S.lbl}>Additional Notes<textarea value={d.additionalNotes} onChange={e=>upd("additionalNotes",e.target.value)} rows={3} style={S.ta}/></label>
            </div>
          </section>

          <section style={S.card}>
            <h3 style={S.sh}>Clinical Dental Notes</h3>
            <textarea value={d.dentalNotes} onChange={e=>upd("dentalNotes",e.target.value)} rows={4} style={S.ta} placeholder="General dental notes…"/>
          </section>
        </div>

        <div style={S.card}>
          <h3 style={S.sh}>Dental Chart (Palmer Notation)</h3>
          <DentalChart chart={chart} onChange={(k,v)=>{setChart(p=>({...p,[k]:v}));setUnsaved(true);}}/>
        </div>
      </div>

      <div style={{marginTop:"1.25rem",display:"flex",gap:10,alignItems:"center"}}>
        <button onClick={save} style={{...S.btn(flash?"#2e7d32":"#1565c0"),transition:"background .3s"}}>
          {flash?<><i className="ti ti-check"/>Saved!</>:<><i className="ti ti-device-floppy"/>Save History</>}
        </button>
        {unsaved&&<span style={{color:"#e65100",fontSize:13}}>Save before switching patients.</span>}
      </div>
    </div>
  );
}


// ─── PROCEDURE CHART (Palmer layout + procedure-type palette) ─────────────────
const PROC_COLORS = {
  "Composite Filling":  { fill:"#e3f2fd", stroke:"#1565c0", text:"#0d47a1"  },
  "Amalgam Filling":    { fill:"#e8eaf6", stroke:"#3949ab", text:"#1a237e"  },
  "Root Canal Treatment":{ fill:"#fce4ec", stroke:"#c62828", text:"#b71c1c" },
  "Crown (Porcelain)":  { fill:"#f3e5f5", stroke:"#7b1fa2", text:"#4a148c" },
  "Crown (Zirconia)":   { fill:"#ede7f6", stroke:"#512da8", text:"#311b92" },
  "Crown (Metal)":      { fill:"#eceff1", stroke:"#546e7a", text:"#263238" },
  "Extraction":         { fill:"#ffebee", stroke:"#e53935", text:"#b71c1c" },
  "Implant":            { fill:"#e0f7fa", stroke:"#00838f", text:"#006064" },
  "Bridge":             { fill:"#fff8e1", stroke:"#f9a825", text:"#f57f17" },
  "Veneer":             { fill:"#fce4ec", stroke:"#e91e63", text:"#880e4f" },
  "Scaling & Polishing":{ fill:"#e8f5e9", stroke:"#2e7d32", text:"#1b5e20" },
  "Deep Cleaning":      { fill:"#f1f8e9", stroke:"#558b2f", text:"#33691e" },
  "Teeth Whitening":    { fill:"#fffde7", stroke:"#fbc02d", text:"#f57f17" },
  "Partial Denture":    { fill:"#fbe9e7", stroke:"#bf360c", text:"#bf360c" },
  "Complete Denture":   { fill:"#efebe9", stroke:"#6d4c41", text:"#4e342e" },
  "X-Ray":              { fill:"#e8eaf6", stroke:"#5c6bc0", text:"#283593" },
  "Consultation":       { fill:"#f5f5f5", stroke:"#757575", text:"#424242" },
  "Pocket Cleaning":    { fill:"#e8f5e9", stroke:"#388e3c", text:"#1b5e20" },
  "Other":              { fill:"#fafafa", stroke:"#9e9e9e", text:"#616161" },
};

function ProcToothSVG({ num, quad, markedProc, size=38, onClick, isRangeStart=false }) {
  const c = markedProc ? (PROC_COLORS[markedProc]||PROC_COLORS["Other"]) : null;
  const isUp = quad==="UR"||quad==="UL";
  const isMolar = num>=5;
  const cx=size/2, cy=size/2, w=isMolar?size*.7:size*.55, h=size*.45, rx=isMolar?4:6;
  const sym = quad==="UR"?`${num}⌐`:quad==="UL"?`⌐${num}`:quad==="LR"?`${num}¬`:`¬${num}`;
  const fill   = c ? c.fill   : "#f9f9f9";
  const stroke = c ? c.stroke : "#d0d0d0";
  return (
    <div onClick={onClick} title={`${sym}${markedProc?" – "+markedProc:""}`}
      style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",userSelect:"none",gap:1}}>
      <span style={{fontSize:9,color:c?c.text:"#999",fontFamily:"monospace",lineHeight:1,fontWeight:c?700:400}}>{sym}</span>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {/* root */}
        <line x1={cx} y1={isUp?cy+h/2:cy-h/2} x2={cx} y2={isUp?cy+h/2+8:cy-h/2-8}
          stroke={stroke} strokeWidth="1.5" strokeDasharray="2,1"/>
        {/* crown */}
        <rect x={cx-w/2} y={cy-h/2} width={w} height={h} rx={rx}
          fill={isRangeStart?"#fff3e0":fill} stroke={isRangeStart?"#e65100":stroke} strokeWidth={isRangeStart?3:c?2:1}/>
        {isRangeStart&&<rect x={cx-w/2-2} y={cy-h/2-2} width={w+4} height={h+4} rx={rx+2} fill="none" stroke="#e65100" strokeWidth="1.5" strokeDasharray="3,2" opacity=".7"/>}
        {/* molar cusps */}
        {isMolar&&<>
          <line x1={cx-w/4} y1={cy-h/2} x2={cx-w/4} y2={cy+h/2} stroke={stroke} strokeWidth=".5" opacity=".4"/>
          <line x1={cx+w/4} y1={cy-h/2} x2={cx+w/4} y2={cy+h/2} stroke={stroke} strokeWidth=".5" opacity=".4"/>
        </>}
        {/* marked dot */}
        {c&&<circle cx={cx} cy={cy} r={4} fill={stroke} opacity=".85"/>}
      </svg>
    </div>
  );
}

function ProcDecToothSVG({ letter, quad, markedProc, size=30, onClick, isRangeStart=false }) {
  const c = markedProc ? (PROC_COLORS[markedProc]||PROC_COLORS["Other"]) : null;
  const isUp = quad==="UR"||quad==="UL";
  const cx=size/2, cy=size/2;
  const sym = quad==="UR"?`${letter}⌐`:quad==="UL"?`⌐${letter}`:quad==="LR"?`${letter}¬`:`¬${letter}`;
  const fill   = c ? c.fill   : "#f9f9f9";
  const stroke = c ? c.stroke : "#d0d0d0";
  return (
    <div onClick={onClick} title={`${sym}${markedProc?" – "+markedProc:""}`}
      style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",gap:1}}>
      <span style={{fontSize:8,color:c?c.text:"#aaa",fontFamily:"monospace",lineHeight:1,fontWeight:c?700:400}}>{sym}</span>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <line x1={cx} y1={isUp?cy+8:cy-8} x2={cx} y2={isUp?cy+13:cy-13}
          stroke={stroke} strokeWidth="1" strokeDasharray="2,1"/>
        <rect x={cx-8} y={cy-7} width={16} height={14} rx={5}
          fill={isRangeStart?"#fff3e0":fill} stroke={isRangeStart?"#e65100":stroke} strokeWidth={isRangeStart?3:c?2:1}/>
        <text x={cx} y={cy+4} textAnchor="middle" fontSize="9"
          fill={c?c.text:"#aaa"} fontWeight={c?"700":"400"}>{letter}</text>
        {c&&<circle cx={cx} cy={cy-1} r={3} fill={stroke} opacity=".75"/>}
      </svg>
    </div>
  );
}

function ProcedureChart({ markedTeeth, selectedProc, onToothClick, rangeStart }) {
  // markedTeeth: { "UR-6": "Root Canal Treatment", "ULd-A": "Extraction", ... }
  // clicking a tooth: if already marked with selectedProc → unmark; else → mark with selectedProc

  const mkP = (q,ns) => ns.map(n => {
    const key = `${q}-${n}`;
    const isRangeStart = rangeStart === key;
    return <ProcToothSVG key={key} num={n} quad={q} markedProc={markedTeeth[key]||null} size={38}
      isRangeStart={isRangeStart} onClick={()=>onToothClick(key)}/>;
  });
  const mkD = (q,ls) => ls.map(l => {
    const key = `${q}d-${l}`;
    const isRangeStart = rangeStart === key;
    return <ProcDecToothSVG key={key} letter={l} quad={q} markedProc={markedTeeth[key]||null} size={30}
      isRangeStart={isRangeStart} onClick={()=>onToothClick(key)}/>;
  });

  const quadRow = (label, content) => (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
      <div style={{fontSize:9,color:"#999",marginBottom:3}}>{label}</div>
      <div style={{display:"flex",gap:2}}>{content}</div>
    </div>
  );
  const midLine = (color="#c5cae9") => <div style={{width:2,background:color,margin:"0 4px",borderRadius:2}}/>;

  return (
    <div style={{background:"#f8f9ff",borderRadius:10,padding:".75rem",border:"1px solid #c5cae9"}}>
      {!selectedProc && (
        <div style={{textAlign:"center",fontSize:12,color:"#e65100",marginBottom:8,background:"#fff3e0",borderRadius:6,padding:"5px 10px"}}>
          ← Select a Procedure Type first, then click a tooth to mark it
        </div>
      )}
      {/* Permanent */}
      <div style={{background:"#fff",borderRadius:8,padding:".6rem",marginBottom:6,border:"1px solid #e8eaf6"}}>
        <div style={{fontSize:10,fontWeight:600,color:"#3949ab",textAlign:"center",marginBottom:4}}>PERMANENT TEETH</div>
        <div style={{display:"flex",justifyContent:"center",gap:2,marginBottom:3}}>
          {quadRow("Upper Right", mkP("UR",[8,7,6,5,4,3,2,1]))}
          {midLine()}
          {quadRow("Upper Left", mkP("UL",[1,2,3,4,5,6,7,8]))}
        </div>
        <div style={{height:1,background:"#e8eaf6",margin:"3px 0"}}/>
        <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:3}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
            <div style={{display:"flex",gap:2}}>{mkP("LR",[8,7,6,5,4,3,2,1])}</div>
            <div style={{fontSize:9,color:"#999",marginTop:3}}>Lower Right</div>
          </div>
          {midLine()}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
            <div style={{display:"flex",gap:2}}>{mkP("LL",[1,2,3,4,5,6,7,8])}</div>
            <div style={{fontSize:9,color:"#999",marginTop:3}}>Lower Left</div>
          </div>
        </div>
      </div>
      {/* Deciduous */}
      <div style={{background:"#fff",borderRadius:8,padding:".6rem",border:"1px solid #e8eaf6"}}>
        <div style={{fontSize:10,fontWeight:600,color:"#7b1fa2",textAlign:"center",marginBottom:4}}>DECIDUOUS TEETH (Baby Teeth)</div>
        <div style={{display:"flex",justifyContent:"center",gap:2,marginBottom:3}}>
          {quadRow("Upper Right", mkD("UR",["E","D","C","B","A"]))}
          {midLine("#ce93d8")}
          {quadRow("Upper Left", mkD("UL",["A","B","C","D","E"]))}
        </div>
        <div style={{height:1,background:"#f3e5f5",margin:"3px 0"}}/>
        <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:3}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
            <div style={{display:"flex",gap:2}}>{mkD("LR",["E","D","C","B","A"])}</div>
            <div style={{fontSize:9,color:"#999",marginTop:3}}>Lower Right</div>
          </div>
          {midLine("#ce93d8")}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
            <div style={{display:"flex",gap:2}}>{mkD("LL",["A","B","C","D","E"])}</div>
            <div style={{fontSize:9,color:"#999",marginTop:3}}>Lower Left</div>
          </div>
        </div>
      </div>
      {/* Legend of marked teeth */}
      {Object.keys(markedTeeth).length>0&&(
        <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:5}}>
          {Object.entries(markedTeeth).map(([key,proc])=>{
            const c=PROC_COLORS[proc]||PROC_COLORS["Other"];
            return (
              <span key={key} style={{background:c.fill,border:`1px solid ${c.stroke}`,color:c.text,borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                {key}: {proc}
                <button onClick={()=>onToothClick(key,"__clear__")} style={{background:"none",border:"none",color:c.text,cursor:"pointer",fontSize:12,lineHeight:1,padding:0,opacity:.7}}>×</button>
              </span>

          })}
        </div>
      )}
    </div>
  );
}

// ─── PROCEDURES PAGE ─────────────────────────────────────────────────────────
function ProceduresPage({ patient, onSave, onDelete, unsaved, setUnsaved }) {
  // ── Edit 3: Added "Pocket Cleaning" ─────────────────────────────────────────
  const BASE_PROC_TYPES = ["Composite Filling","Amalgam Filling","Root Canal Treatment",
    "Crown (Porcelain)","Crown (Zirconia)","Crown (Metal)","Extraction","Implant","Bridge",
    "Veneer","Scaling & Polishing","Pocket Cleaning","Deep Cleaning","Teeth Whitening",
    "Partial Denture","Complete Denture","X-Ray","Consultation"];

  // ── Edit 2: Procedures that allow multi-tooth range selection ────────────────
  const MULTI_TOOTH_PROCS = ["Complete Denture","Partial Denture","Crown (Porcelain)",
    "Crown (Zirconia)","Crown (Metal)","Implant","Veneer","Bridge"];

  // ── Edit 1: custom "Other" procedure types (like medical conditions) ─────────
  const [customProcTypes, setCustomProcTypes] = useState([]);
  const [otherProcOpen, setOtherProcOpen]     = useState(false);
  const [otherProcText, setOtherProcText]     = useState("");

  const ALL_PROC_TYPES = [...BASE_PROC_TYPES, ...customProcTypes];

  function addCustomProcType() {
    const v = otherProcText.trim();
    if (!v) return;
    if (!customProcTypes.includes(v)) setCustomProcTypes(prev=>[...prev,v]);
    setDraft(p=>({...p,procedure:v}));
    setOtherProcText(""); setOtherProcOpen(false); setUnsaved(true);
  }

  // ── Edit 2: Range selection state ───────────────────────────────────────────
  const [draft, setDraft] = useState({date:today(),procedure:"",tooth:"",cost:"",status:"Completed",notes:""});
  const [markedTeeth, setMarkedTeeth] = useState({});
  const [flash, setFlash] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [rangeMode,  setRangeMode]  = useState(false);  // is range mode active?
  const [rangeStart, setRangeStart] = useState(null);   // first tooth clicked

  const isMultiTooth = MULTI_TOOTH_PROCS.includes(draft?.procedure);

  // All permanent teeth in order (for range calculation)
  const PERM_ORDER = [
    "UR-8","UR-7","UR-6","UR-5","UR-4","UR-3","UR-2","UR-1",
    "UL-1","UL-2","UL-3","UL-4","UL-5","UL-6","UL-7","UL-8",
    "LR-8","LR-7","LR-6","LR-5","LR-4","LR-3","LR-2","LR-1",
    "LL-1","LL-2","LL-3","LL-4","LL-5","LL-6","LL-7","LL-8",
  ];

  function getRange(start, end) {
    const si = PERM_ORDER.indexOf(start);
    const ei = PERM_ORDER.indexOf(end);
    if (si===-1||ei===-1) return [start,end];
    const lo=Math.min(si,ei), hi=Math.max(si,ei);
    return PERM_ORDER.slice(lo,hi+1);
  }

  useEffect(()=>{
    setDraft({date:today(),procedure:"",tooth:"",cost:"",status:"Completed",notes:""});
    setMarkedTeeth({}); setRangeMode(false); setRangeStart(null);
    setCustomProcTypes([]); setOtherProcOpen(false); setOtherProcText("");
    setUnsaved(false);
  },[patient?.id]);

  // When procedure changes, reset range state
  useEffect(()=>{ setRangeMode(false); setRangeStart(null); },[draft.procedure]);

  function handleToothClick(key, forceAction) {
    if (forceAction==="__clear__") {
      setMarkedTeeth(t=>{ const n={...t}; delete n[key]; return n; });
      setDraft(p=>({...p,tooth:buildToothString({...markedTeeth,[key]:undefined})}));
      setUnsaved(true); return;
    }
    if (!draft.procedure) return;

    if (rangeMode && isMultiTooth) {
      if (!rangeStart) {
        // First click → set range start
        setRangeStart(key);
      } else {
        // Second click → fill entire range
        const range = getRange(rangeStart, key);
        setMarkedTeeth(prev=>{
          const next={...prev};
          range.forEach(k=>{ next[k]=draft.procedure; });
          setDraft(p=>({...p,tooth:buildToothString(next)}));
          return next;
        });
        setRangeStart(null);
        setUnsaved(true);
      }
    } else {
      // Normal single-tooth toggle
      setMarkedTeeth(prev=>{
        const next={...prev};
        if(next[key]===draft.procedure){delete next[key];}
        else{next[key]=draft.procedure;}
        setDraft(p=>({...p,tooth:buildToothString(next)}));
        setUnsaved(true);
        return next;
      });
    }
  }

  function buildToothString(teeth) {
    return Object.entries(teeth).filter(([,v])=>v).map(([k])=>k).join(", ");
  }

  function save(){
    if(!draft.procedure)return;
    onSave({procedure:{...draft,id:Date.now(),cost:parseFloat(draft.cost)||0}});
    setDraft({date:today(),procedure:"",tooth:"",cost:"",status:"Completed",notes:""});
    setMarkedTeeth({}); setRangeMode(false); setRangeStart(null);
    setUnsaved(false); setFlash(true); setTimeout(()=>setFlash(false),2000);
  }

  const procs=patient?.procedures||[];
  const total=procs.reduce((s,p)=>s+(p.cost||0),0);
  const sbadge=s=>s==="Completed"?S.badge("#e8f5e9","#2e7d32"):s==="Planned"?S.badge("#fff3e0","#e65100"):s==="In Progress"?S.badge("#e3f2fd","#1565c0"):S.badge("#fce4ec","#c62828");

  return (
    <div style={{padding:"1.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div><h2 style={{margin:0,fontSize:20,fontWeight:600,color:"#1a237e"}}>{patient?.name} – Procedures</h2>
          <span style={{fontSize:11,color:"#1565c0",fontFamily:"monospace"}}>{patient?.code}</span></div>
        {unsaved&&<span style={{...S.badge("#fff3e0","#e65100"),border:"1px solid #ffcc02"}}>● Unsaved</span>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:"1rem",marginBottom:"1rem"}}>
        {/* ── Left: form fields ── */}
        <section style={S.card}>
          <h3 style={S.sh}>Add Procedure</h3>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            <label style={S.lbl}>Date
              <input type="date" value={draft.date}
                onChange={e=>{setDraft(p=>({...p,date:e.target.value}));setUnsaved(true);}} style={S.inp}/>
            </label>

            {/* ── Edit 1 + 3: Procedure Type pills with custom Other ── */}
            <div style={S.lbl}>
              <span style={{fontWeight:600}}>Procedure Type</span>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>

                {/* Standard types */}
                {BASE_PROC_TYPES.map(t=>{
                  const active=draft.procedure===t;
                  const c=PROC_COLORS[t]||PROC_COLORS["Other"];
                  return (
                    <button key={t} onClick={()=>{setDraft(p=>({...p,procedure:t}));setUnsaved(true);}} style={{
                      background:active?c.stroke:"#f5f5f5",
                      color:active?"#fff":"#444",
                      border:active?"none":"1px solid #e0e0e0",
                      borderRadius:20,padding:"4px 11px",fontSize:11,
                      cursor:"pointer",fontWeight:active?700:400,transition:"background .15s"
                    }}>{t}</button>
                  );
                })}

                {/* Custom types added via Other – shown as active-style pills with × */}
                {customProcTypes.map(t=>{
                  const active=draft.procedure===t;
                  const c=PROC_COLORS["Other"];
                  return (
                    <button key={t} onClick={()=>{setDraft(p=>({...p,procedure:t}));setUnsaved(true);}} style={{
                      background:active?c.stroke:"#1565c0",
                      color:"#fff",
                      border:"2px dashed #90caf9",
                      borderRadius:20,padding:"4px 11px",fontSize:11,
                      cursor:"pointer",fontWeight:active?700:600,
                      display:"flex",alignItems:"center",gap:5,transition:"background .15s"
                    }}>
                      {t}
                      <span onClick={e=>{
                        e.stopPropagation();
                        setCustomProcTypes(prev=>prev.filter(x=>x!==t));
                        if(draft.procedure===t) setDraft(p=>({...p,procedure:""}));
                      }} style={{fontSize:14,opacity:.75,lineHeight:1}}>×</span>
                    </button>
                  );
                })}

                {/* + Other button — inline input like medical conditions */}
                {!otherProcOpen ? (
                  <button onClick={()=>setOtherProcOpen(true)} style={{
                    background:"#f0f4ff",color:"#1565c0",
                    border:"1px dashed #90caf9",borderRadius:20,
                    padding:"4px 12px",fontSize:11,cursor:"pointer",fontWeight:600
                  }}>+ Other</button>
                ) : (
                  <div style={{display:"flex",gap:5,alignItems:"center",
                    background:"#e8f0fe",borderRadius:20,padding:"3px 6px 3px 12px",
                    border:"1px solid #90caf9"}}>
                    <input autoFocus value={otherProcText}
                      onChange={e=>setOtherProcText(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addCustomProcType();}
                                     if(e.key==="Escape"){setOtherProcOpen(false);setOtherProcText("");}}}
                      placeholder="e.g. Laser Whitening"
                      style={{border:"none",background:"transparent",outline:"none",
                        fontSize:12,color:"#1a237e",width:140,fontWeight:500}}/>
                    <button onClick={addCustomProcType} style={{
                      background:"#1565c0",color:"#fff",border:"none",
                      borderRadius:16,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>Add</button>
                    <button onClick={()=>{setOtherProcOpen(false);setOtherProcText("");}} style={{
                      background:"none",border:"none",color:"#888",fontSize:16,cursor:"pointer",lineHeight:1,padding:"0 4px"}}>×</button>
                  </div>
                )}
              </div>
            </div>

            {/* ── Edit 2: Range mode toggle — only shown for multi-tooth procedures ── */}
            {isMultiTooth && draft.procedure && (
              <div style={{background:"#e8f0fe",borderRadius:8,padding:"8px 12px",border:"1px solid #90caf9"}}>
                <div style={{fontSize:12,color:"#1a237e",fontWeight:600,marginBottom:6}}>
                  🔗 Multi-Tooth Selection — <span style={{color:"#1565c0"}}>{draft.procedure}</span>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {/* Toggle switch */}
                  <div onClick={()=>{setRangeMode(r=>!r);setRangeStart(null);}}
                    style={{width:44,height:22,borderRadius:11,cursor:"pointer",
                      background:rangeMode?"#1565c0":"#ccc",position:"relative",transition:"background .25s",flexShrink:0}}>
                    <div style={{position:"absolute",top:3,left:rangeMode?23:3,width:16,height:16,
                      borderRadius:"50%",background:"#fff",transition:"left .25s",boxShadow:"0 1px 4px rgba(0,0,0,0.25)"}}/>
                  </div>
                  <div style={{fontSize:12,color:rangeMode?"#1565c0":"#888"}}>
                    {rangeMode
                      ? rangeStart
                        ? `✅ Start: ${rangeStart} — now click the END tooth`
                        : "Click the START tooth on the chart"
                      : "Toggle ON to select a range (e.g. UR-6 to UL-6)"}
                  </div>
                </div>
                {rangeMode && rangeStart && (
                  <button onClick={()=>setRangeStart(null)} style={{...S.sbtn("#e65100"),marginTop:6,fontSize:10}}>
                    ✕ Cancel range (click new start)
                  </button>
                )}
              </div>
            )}

            {/* Tooth display */}
            <label style={S.lbl}>
              <span style={{display:"flex",justifyContent:"space-between"}}>
                <span>Selected Teeth (Palmer)</span>
                {draft.tooth&&<span style={{fontSize:10,color:"#1565c0",fontWeight:600}}>
                  {Object.keys(markedTeeth).length} tooth/teeth
                </span>}
              </span>
              <input value={draft.tooth}
                onChange={e=>{setDraft(p=>({...p,tooth:e.target.value}));setUnsaved(true);}}
                style={{...S.inp,background:"#e8f5e9",fontWeight:600,color:"#1b5e20"}}
                placeholder="Click teeth on chart → or type manually"/>
            </label>

            <label style={S.lbl}>Cost (EGP)
              <input type="number" value={draft.cost}
                onChange={e=>{setDraft(p=>({...p,cost:e.target.value}));setUnsaved(true);}} style={S.inp}/>
            </label>
            <label style={S.lbl}>Status
              <select value={draft.status}
                onChange={e=>{setDraft(p=>({...p,status:e.target.value}));setUnsaved(true);}} style={S.inp}>
                {["Planned","In Progress","Completed","On Hold","Cancelled"].map(s=><option key={s}>{s}</option>)}
              </select>
            </label>
            <label style={S.lbl}>Notes
              <textarea value={draft.notes}
                onChange={e=>{setDraft(p=>({...p,notes:e.target.value}));setUnsaved(true);}}
                rows={2} style={S.ta}/>
            </label>
          </div>
          <div style={{marginTop:10,display:"flex",gap:10,alignItems:"center"}}>
            <button onClick={save} style={{...S.btn(flash?"#2e7d32":"#1565c0"),transition:"background .3s"}}>
              {flash?<>✓ Saved!</>:<>💾 Save Procedure</>}
            </button>
            {unsaved&&<span style={{color:"#e65100",fontSize:12}}>Save before switching.</span>}
          </div>
        </section>

        {/* ── Right: Procedure Chart ── */}
        <section style={S.card}>
          <h3 style={S.sh}>
            Tooth Selector – Palmer Notation Chart
            {rangeMode && rangeStart && (

// ─── APPOINTMENTS PAGE ────────────────────────────────────────────────────────
function AppointmentsPage({ patient, onSave, onDelete, clinicName, calLinks, onToggleCalLinks, allPatients }) {
  const [draft,      setDraft]      = useState({date:today(),time:"09:00",purpose:"",status:"Scheduled",notes:""});
  const [flash,      setFlash]      = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [calMenu,    setCalMenu]    = useState(null); // id of open dropdown
  // Sync perm from the real browser Notification.permission
  const [perm, setPerm] = useState(getNotifPerm());

  // Re-sync whenever the page becomes visible again (after tab switch or navigation)
  useEffect(() => {
    function syncPerm() { setPerm(getNotifPerm()); }
    document.addEventListener('visibilitychange', syncPerm);
    window.addEventListener('focus', syncPerm);
    syncPerm(); // also sync immediately on mount
    return () => {
      document.removeEventListener('visibilitychange', syncPerm);
      window.removeEventListener('focus', syncPerm);
    };
  }, []);

  // Re-register all timers whenever this component mounts (handles page reload)
  useEffect(() => {
    if (getNotifPerm() === 'granted' && allPatients) {
      registerAllNotifs(allPatients);
    }
  }, []);

  const PURPOSES = ["Routine Check-up","Consultation","Follow-up","Teeth Cleaning","Root Canal","Extraction","Crown Placement","Orthodontic Check","Emergency","Other"];
  const sbadge = s => s==="Scheduled"?S.badge("#e3f2fd","#1565c0"):s==="Completed"?S.badge("#e8f5e9","#2e7d32"):S.badge("#fce4ec","#c62828");

  const appts   = patient?.appointments||[];
  const futureS = appts.filter(a=>a.status==="Scheduled"&&a.date>=today());

  async function handleEnableNotif() {
    const r = await askNotifPerm();
    setPerm(r);
    if (r==="granted") {
      // Immediately register all patients' future appointments
      if (allPatients) registerAllNotifs(allPatients);
      fireNotif("🦷 DentalPro Notifications Active",
        "You will be reminded 24 h, 1 h, 30 min and 10 min before each appointment.");
    }
  }

  function save() {
    if(!draft.purpose||!draft.date) return;
    const newAppt = {...draft, id:Date.now()};
    onSave({appointment: newAppt});
    // Immediately schedule notifications for this new appointment
    if (perm==="granted") scheduleApptNotifs(newAppt, patient.name);
    setDraft({date:today(),time:"09:00",purpose:"",status:"Scheduled",notes:""});
    setFlash(true); setTimeout(()=>setFlash(false),2000);
  }

  // Export ALL future scheduled appointments for this patient as one .ics file
  function exportAllICS() {
    const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//DentalPro//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
    futureS.forEach(a => {
      const s  = toIcalDT(a.date, a.time);
      const [sh] = (a.time||'09:00').split(':').map(Number);
      const eh = String(sh+1).padStart(2,'0');
      const mi = (a.time||'09:00').split(':')[1]||'00';
      const e  = toIcalDT(a.date, `${eh}:${mi}`);
      const now = new Date().toISOString().replace(/[-:.]/g,'').slice(0,15);
      lines.push('BEGIN:VEVENT',`UID:dp-${a.id}@dentalpro`,`DTSTAMP:${now}Z`,
        `DTSTART:${s}`,`DTEND:${e}`,
        `SUMMARY:${a.purpose} – ${patient.name}`,
        `DESCRIPTION:${a.notes||''}`,`LOCATION:${clinicName||'Dental Clinic'}`,
        'STATUS:CONFIRMED','END:VEVENT');
    });
    lines.push('END:VCALENDAR');
    const blob = new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `all_appts_${patient.name.replace(/\s+/g,'_')}.ics`;
    link.click();
  }

  // Notification status display

  const notifGranted = livePerm==="granted";

  const notifUnsup   = livePerm==="unsupported";

    <div style={{padding:"1.5rem"}}>

      {/* Header */}

        <span style={{fontSize:11,color:"#1565c0",fontFamily:"monospace"}}>{patient?.code}</span>
      </div>

      {/* ── Notification status card ─────────────────────────────────────── */}
      <div style={{...S.card,marginBottom:"1rem",
        background: notifGranted?"#e8f5e9": notifDenied?"#fce4ec":"#fff8e1",
        border:`1px solid ${notifGranted?"#81c784":notifDenied?"#ef9a9a":"#ffe082"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontWeight:600,fontSize:14,color: notifGranted?"#2e7d32":notifDenied?"#c62828":"#e65100"}}>
              {notifGranted?"🔔 Appointment Notifications: ON"
               :notifDenied?"🔕 Notifications Blocked by Browser"

            </div>
            <div style={{fontSize:12,color:"#666",marginTop:3}}>
              {notifGranted

                ? "Blocked by browser. Click the 🔒 icon in the address bar → Notifications → Allow, then reload the page."

                ? "Your browser does not support notifications. Try Chrome or Edge."

            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {!notifGranted && !notifDenied && !notifUnsup && (
              <button onClick={async () => {
                handleEnableNotif();
              }} style={{...S.btn("#e65100"),fontSize:13}}>
                🔔 Enable Notifications
              </button>
            )}
            {notifGranted && futureS.length>0 && (
              <button onClick={()=>fireNotif(
                  "🦷 Upcoming: "+patient.name,

                )} style={{...S.btn("#2e7d32"),fontSize:12}}>
                📋 Preview Reminders
              </button>
            )}
          </div>
        </div>
      </div>

      {/* ── Add ALL scheduled appointments to calendar ───────────────────── */}
      {futureS.length>0 && (
        <div style={{...S.card,marginBottom:"1rem",background:"#f0f4ff",border:"1px solid #c5cae9"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:"#1a237e"}}>
                📆 Add All {futureS.length} Scheduled Appointment{futureS.length!==1?"s":""} to Calendar
              </div>
              <div style={{fontSize:12,color:"#666",marginTop:2}}>
                Export all upcoming appointments for {patient.name} to your calendar app at once.
              </div>
            </div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
              <a href={gCalURL(futureS[0], patient.name, clinicName)} target="_blank" rel="noopener noreferrer"
                title={futureS.length>1?"Google Calendar (first appointment — download .ics for all)":"Add to Google Calendar"}

          {/* Toggle calendar links visibility */}
          <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:"#555"}}>Show calendar buttons on each appointment row:</span>
            <div onClick={onToggleCalLinks} style={{
              width:40,height:20,borderRadius:10,cursor:"pointer",

              {calLinks?"ON":"OFF"}

        </div>
      )}

      {/* ── Schedule form ───────────────────────────────────────────────── */}
      <section style={{...S.card,marginBottom:"1rem"}}>

          <label style={S.lbl}>Time<input type="time" value={draft.time} onChange={e=>setDraft(p=>({...p,time:e.target.value}))} style={S.inp}/></label>
