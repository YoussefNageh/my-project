// ─── X-RAYS & PHOTOS PAGE ────────────────────────────────────────────────────
function XRaysPage({ patient, onSave, onDelete }) {
  const [form, setForm] = useState({type:"X-Ray (Periapical)",description:"",date:today()});
  const [selectedFile, setSelectedFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [flash, setFlash] = useState(false);
  const [viewImg, setViewImg] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [atomicaToast, setAtomicaToast] = useState(null); // {msg, ok}
  const fileRef = useRef();
  const TYPES = ["X-Ray (Periapical)","X-Ray (Bitewing)","X-Ray (Panoramic)","X-Ray (Cephalometric)","CBCT Scan","Clinical Photo (Frontal)","Clinical Photo (Lateral)","Clinical Photo (Intraoral)","Study Model","Other"];

  function handleFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    setSelectedFile(f);
    // ── NEVER read DCM/CBCT as base64 — files can be 100s of MB and crash the tab
    const isDCM = f.name.toLowerCase().endsWith('.dcm') || form.type === 'CBCT Scan';
    if (isDCM) {
      setPreview(null); // no image preview for DICOM
    } else {
      const r = new FileReader();
      r.onload = ev => setPreview(ev.target.result);
      r.readAsDataURL(f);
    }
  }

  function save() {
    if (!selectedFile && !form.description) return;
    const isCBCTSave = form.type === 'CBCT Scan' || (selectedFile?.name||'').toLowerCase().endsWith('.dcm');

    // ── For CBCT: store ONLY metadata (no base64 blob) to avoid crashing localStorage
    const img = {
      id: Date.now(),
      ...form,
      filename: selectedFile?.name || '',
      // Only store previewUrl for normal images, never for DICOM
      previewUrl: isCBCTSave ? null : preview,
      isCBCT: isCBCTSave,
      fileSize: selectedFile ? Math.round(selectedFile.size / 1024) + ' KB' : '',
    };
    onSave({ image: img });

    // ── CBCT: open the original File object directly (no re-encoding needed)
    if (isCBCTSave && selectedFile) {
      // Create a fresh object URL from the File — no base64 conversion
      const objectUrl = URL.createObjectURL(selectedFile);
      const a = document.createElement('a');
      a.href = objectUrl;
      a.download = selectedFile.name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(objectUrl), 5000);

      // Also try atomica:// protocol
      setTimeout(() => {
        try { window.location.href = 'atomica://open'; } catch(e) {}
      }, 500);

      setAtomicaToast({
        ok: true,
        msg: `🧠 "${selectedFile.name}" is downloading now. Open it in Atomica. If Atomica is installed it may open automatically. Get Atomica at atomica3d.com`
      });
      setTimeout(() => setAtomicaToast(null), 10000);
    }

    setForm({ type: "X-Ray (Periapical)", description: "", date: today() });
    setSelectedFile(null);
    setPreview(null);
    if (fileRef.current) fileRef.current.value = "";
    setFlash(true);
    setTimeout(() => setFlash(false), 2000);
  }

  const images=patient?.images||[];
  const isCBCT=(t)=>t==="CBCT Scan";

  return (
    <div style={{padding:"1.5rem"}}>
      <div style={{marginBottom:"1rem"}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:600,color:"#1a237e"}}>{patient?.name} – X-Rays & Photos</h2>
        <span style={{fontSize:11,color:"#1565c0",fontFamily:"monospace"}}>{patient?.code}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:"1rem"}}>
        <section style={S.card}>
          <h3 style={S.sh}>Upload Image / X-Ray</h3>
          <label style={S.lbl}>Image Type<select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} style={S.inp}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></label>
          <label style={{...S.lbl,marginTop:8}}>Description<input value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} style={S.inp} placeholder="Optional"/></label>
          <label style={{...S.lbl,marginTop:8}}>Date<input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={S.inp}/></label>
          {isCBCT(form.type)&&<div style={{marginTop:8,background:"#e3f2fd",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#1565c0"}}>ℹ️ CBCT: The .dcm file will be saved as a record and downloaded for Atomica. The file is <strong>not</strong> stored inside the app (too large) — keep the original on your computer.</div>}
          <div style={{marginTop:10,border:"2px dashed #c5cae9",borderRadius:8,padding:"1rem",textAlign:"center",cursor:"pointer"}} onClick={()=>fileRef.current?.click()}>
            {selectedFile && isCBCT(form.type) ? (
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                <div style={{fontSize:36}}>🧠</div>
                <div style={{fontSize:13,fontWeight:600,color:"#1565c0"}}>{selectedFile.name}</div>
                <div style={{fontSize:11,color:"#888"}}>{Math.round(selectedFile.size/1024/1024*10)/10} MB · DICOM file ready</div>
                <div style={{fontSize:10,color:"#aaa"}}>Click to change file</div>
              </div>
            ) : preview ? (
              <img src={preview} alt="preview" style={{maxWidth:"100%",maxHeight:160,borderRadius:6}}/>
            ) : (
              <div><div style={{fontSize:28,color:"#9fa8da"}}>📁</div><div style={{fontSize:12,color:"#888",marginTop:4}}>Click to select file</div></div>
            )}
          </div>
          <input ref={fileRef} type="file" accept="image/*,.dcm" style={{display:"none"}} onChange={handleFile}/>
          <button onClick={save} style={{...S.btn(flash?"#2e7d32":"#00695c"),marginTop:9,transition:"background .3s"}}>{flash?<><i className="ti ti-check"/>Saved!</>:<><i className="ti ti-upload"/>Upload Record</>}</button>
        </section>

        <section style={S.card}>
          <h3 style={S.sh}>Patient Images & X-Rays ({images.length}) — click to view</h3>
          {!images.length?<p style={{color:"#999",textAlign:"center",padding:"2rem"}}>No images uploaded yet.</p>:(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
              {images.map((img,i)=>(
                <div key={img.id||i} style={{border:"1px solid #e0e0e0",borderRadius:8,overflow:"hidden",background:"#fafafa",position:"relative"}}>
                  <button onClick={()=>setConfirmDel(img)} style={{position:"absolute",top:4,right:4,background:"rgba(198,40,40,0.85)",color:"#fff",border:"none",borderRadius:4,padding:"2px 7px",fontSize:10,cursor:"pointer",zIndex:1}}>🗑</button>
                  <div style={{cursor:"pointer"}} onClick={()=>{
                    if(!isCBCT(img.type)){
                      setViewImg(img);
                    } else {
                      // Try atomica:// protocol
                      try { window.location.href = 'atomica://open'; } catch(e) {}
                      setAtomicaToast({
                        ok: true,
                        msg: `🧠 To view "${img.filename||'this CBCT scan'}": locate the original .dcm file on your computer and open it in Atomica. The file is not stored inside DentalPro. Get Atomica at atomica3d.com`
                      });
                      setTimeout(()=>setAtomicaToast(null),9000);
                    }
                  }}>
                    {img.previewUrl ? (
                      <img src={img.previewUrl} alt={img.description} style={{width:"100%",height:110,objectFit:"cover"}}/>
                    ) : (
                      <div style={{height:110,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background: isCBCT(img.type)?"#e3f2fd":"#e8eaf6",gap:4}}>
                        <div style={{fontSize:28}}>{isCBCT(img.type)?"🧠":"🖼️"}</div>
                        <div style={{fontSize:10,color:"#1565c0",fontWeight:600,textAlign:"center",padding:"0 8px"}}>{isCBCT(img.type)?"Open in Atomica":"No Preview"}</div>
                        {img.fileSize&&<div style={{fontSize:9,color:"#888"}}>{img.fileSize}</div>}
                      </div>
                    )}
                  </div>
                  <div style={{padding:"6px 8px"}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#1a237e"}}>{img.type}</div>
                    <div style={{fontSize:10,color:"#777"}}>{img.date}</div>
                    {img.description&&<div style={{fontSize:10,color:"#555",marginTop:1}}>{img.description}</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </section>
      </div>

      {/* Image Viewer Modal */}
      {viewImg&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000}} onClick={()=>setViewImg(null)}>
          <div style={{maxWidth:"90vw",maxHeight:"90vh",position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setViewImg(null)} style={{position:"absolute",top:-36,right:0,background:"none",border:"none",color:"#fff",fontSize:28,cursor:"pointer"}}>✕</button>
            {viewImg.previewUrl?(
              <img src={viewImg.previewUrl} alt={viewImg.description} style={{maxWidth:"85vw",maxHeight:"85vh",borderRadius:8,boxShadow:"0 4px 40px rgba(0,0,0,0.6)"}}/>
            ):(
              <div style={{background:"#fff",borderRadius:12,padding:"2rem",textAlign:"center"}}>
                <div style={{fontSize:48}}>🖼️</div>
                <p style={{color:"#555"}}>No preview available for this file.</p>
                <p style={{fontSize:12,color:"#888"}}>{viewImg.filename}</p>
              </div>
            )}
            <div style={{color:"#fff",textAlign:"center",marginTop:10,fontSize:13}}>
              <strong>{viewImg.type}</strong> · {viewImg.date}{viewImg.description&&` · ${viewImg.description}`}
            </div>
          </div>
        </div>
      )}

      {confirmDel&&<ConfirmDelete message={`Delete image "${confirmDel.type}" from ${confirmDel.date}?`} onConfirm={()=>{onDelete("image",confirmDel.id);setConfirmDel(null);}} onCancel={()=>setConfirmDel(null)}/>}

      {/* Atomica toast — fixed bottom banner so it shows anywhere on page */}
      {atomicaToast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:atomicaToast.ok?"#1565c0":"#e65100",color:"#fff",
          borderRadius:12,padding:"12px 20px",fontSize:13,maxWidth:520,
          boxShadow:"0 8px 32px rgba(0,0,0,0.25)",zIndex:9999,lineHeight:1.5,
          display:"flex",gap:12,alignItems:"flex-start"}}>
          <span style={{fontSize:20,flexShrink:0}}>🧠</span>
          <span style={{flex:1}}>{atomicaToast.msg}</span>
          <button onClick={()=>setAtomicaToast(null)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:6,padding:"2px 8px",cursor:"pointer",flexShrink:0,fontSize:14}}>✕</button>
        </div>
      )}
    </div>
  );
}

// ─── ORTHO PAGE ───────────────────────────────────────────────────────────────
function OrthoPage({ patient, onSave, onDelete }) {
  const ortho=patient?.ortho||{totalAmount:0,payments:[],notes:""};
  const [totalAmount,setTotalAmount]=useState(ortho.totalAmount||0);
  const [orthoNotes,setOrthoNotes]=useState(ortho.notes||"");
  const [draft,setDraft]=useState({date:today(),amount:"",notes:""});
  const [flash,setFlash]=useState(false);
  const [editTotal,setEditTotal]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null);

  useEffect(()=>{setTotalAmount(patient?.ortho?.totalAmount||0);setOrthoNotes(patient?.ortho?.notes||"");setDraft({date:today(),amount:"",notes:""});},[patient?.id]);

  const payments=ortho.payments||[];
  const totalPaid=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const balance=(parseFloat(totalAmount)||0)-totalPaid;
  const pct=totalAmount>0?Math.min(100,Math.round(totalPaid/totalAmount*100)):0;
  const barColor=pct===100?"#2e7d32":pct>=50?"#1565c0":"#e65100";

  function savePayment(){
    if(!draft.amount||parseFloat(draft.amount)<=0)return;
    onSave({orthoPayment:{id:Date.now(),...draft,amount:parseFloat(draft.amount)},orthoTotal:totalAmount,orthoNotes});
    setDraft({date:today(),amount:"",notes:""}); setFlash(true); setTimeout(()=>setFlash(false),2000);
  }

  return (
    <div style={{padding:"1.5rem"}}>
      <div style={{marginBottom:"1rem"}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:600,color:"#b71c1c"}}>{patient?.name} – Orthodontic Payments</h2>
        <span style={{fontSize:11,color:"#1565c0",fontFamily:"monospace"}}>{patient?.code}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:"1rem"}}>
        <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>
          <section style={{...S.card,background:"linear-gradient(135deg,#fce4ec,#fff)"}}>
            <h3 style={{...S.sh,color:"#b71c1c"}}>Financial Summary</h3>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,color:"#555"}}>Total Amount</span>
              {editTotal?(
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" value={totalAmount} onChange={e=>setTotalAmount(e.target.value)} style={{...S.inp,width:110,textAlign:"right"}}/>
                  <button onClick={()=>{onSave({orthoTotal:totalAmount,orthoNotes});setEditTotal(false);}} style={S.sbtn("#2e7d32")}>Set</button>
                  <button onClick={()=>setEditTotal(false)} style={S.sbtn("#757575")}>✕</button>
                </div>
              ):(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:700,color:"#b71c1c"}}>{fmt(totalAmount)} EGP</span>
                  <button onClick={()=>setEditTotal(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#1565c0",fontSize:12}}>✏️ Edit</button>
                </div>
              )}
            </div>
            <div style={{background:"#e0e0e0",borderRadius:20,height:14,marginBottom:8,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:barColor,borderRadius:20,transition:"width .5s"}}/>
            </div>
            <div style={{fontSize:11,color:"#666",textAlign:"center",marginBottom:12}}>{pct}% paid</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["Total",totalAmount,"#1a237e"],["Paid",totalPaid,"#2e7d32"],["Balance",balance,balance>0?"#e65100":"#2e7d32"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#fff",borderRadius:8,padding:"8px",textAlign:"center",border:"1px solid #f0f0f0"}}>
                  <div style={{fontSize:10,color:"#888"}}>{l}</div>
                  <div style={{fontSize:14,fontWeight:700,color:c}}>{fmt(v)}</div>
                  <div style={{fontSize:9,color:"#aaa"}}>EGP</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:10}}>
              <label style={S.lbl}>Treatment Notes<textarea value={orthoNotes} onChange={e=>setOrthoNotes(e.target.value)} rows={2} style={S.ta} placeholder="e.g. Full braces, Invisalign…"/></label>
              <button onClick={()=>onSave({orthoTotal:totalAmount,orthoNotes})} style={{...S.sbtn("#b71c1c"),marginTop:5}}>Save Notes</button>
            </div>
          </section>
          <section style={S.card}>
            <h3 style={S.sh}>Add Visit Payment</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <label style={S.lbl}>Payment Date<input type="date" value={draft.date} onChange={e=>setDraft(p=>({...p,date:e.target.value}))} style={S.inp}/></label>
              <label style={S.lbl}>Amount Paid (EGP)<input type="number" value={draft.amount} onChange={e=>setDraft(p=>({...p,amount:e.target.value}))} style={S.inp} placeholder="0"/></label>
              <label style={S.lbl}>Visit Notes<textarea value={draft.notes} onChange={e=>setDraft(p=>({...p,notes:e.target.value}))} rows={2} style={S.ta} placeholder="e.g. Wire adjustment…"/></label>
            </div>
            <button onClick={savePayment} style={{...S.btn(flash?"#2e7d32":"#b71c1c"),marginTop:9,transition:"background .3s"}}>{flash?<><i className="ti ti-check"/>Saved!</>:<><i className="ti ti-cash"/>Record Payment</>}</button>
          </section>
        </div>

        <section style={S.card}>
          <h3 style={S.sh}>Payment History ({payments.length} visits)</h3>
          {!payments.length?<p style={{color:"#999",textAlign:"center",padding:"2rem"}}>No payments yet. Set total amount and start recording.</p>:(
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {payments.map((pay,i)=>{
                const running=payments.slice(0,i+1).reduce((s,x)=>s+(parseFloat(x.amount)||0),0);
                const rem=(parseFloat(totalAmount)||0)-running;
                return (
                  <div key={pay.id||i} style={{background:"#fafafa",borderRadius:8,padding:".8rem 1rem",border:"1px solid #e0e0e0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{background:"#fce4ec",color:"#b71c1c",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>Visit {i+1}</span>
                          <span style={{fontSize:13,fontWeight:600,color:"#1a237e"}}>{pay.date}</span>
                        </div>
                        {pay.notes&&<div style={{fontSize:12,color:"#666",marginTop:3}}>{pay.notes}</div>}
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:16,fontWeight:700,color:"#2e7d32"}}>+{fmt(pay.amount)} EGP</div>
                          <div style={{fontSize:11,color:"#999"}}>Running: {fmt(running)} EGP</div>
                          <div style={{fontSize:11,color:rem>0?"#e65100":"#2e7d32",fontWeight:600}}>Remaining: {fmt(rem)} EGP</div>
                        </div>
                        <button onClick={()=>setConfirmDel(pay)} style={S.delbtn}>🗑</button>
                      </div>
                    </div>
                  </div>
                );
              })}
              <div style={{background:"#e8f5e9",borderRadius:8,padding:".8rem 1rem",border:"1px solid #a5d6a7",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontWeight:600,color:"#1b5e20"}}>Total Paid</span>
                <span style={{fontWeight:700,fontSize:16,color:"#1b5e20"}}>{fmt(totalPaid)} EGP</span>
              </div>
              {balance>0&&<div style={{background:"#fff3e0",borderRadius:8,padding:".8rem 1rem",border:"1px solid #ffcc02",display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,color:"#e65100"}}>Outstanding Balance</span><span style={{fontWeight:700,fontSize:16,color:"#e65100"}}>{fmt(balance)} EGP</span></div>}
              {balance<=0&&totalAmount>0&&<div style={{background:"#e8f5e9",borderRadius:8,padding:".8rem 1rem",textAlign:"center",border:"1px solid #4caf50"}}><span style={{color:"#2e7d32",fontWeight:700}}>✓ Payment Complete!</span></div>}
            </div>
          )}
        </section>
      </div>
      {confirmDel&&<ConfirmDelete message={`Delete payment of ${fmt(confirmDel.amount)} EGP from ${confirmDel.date}?`} onConfirm={()=>{onDelete("orthoPayment",confirmDel.id);setConfirmDel(null);}} onCancel={()=>setConfirmDel(null)}/>}
    </div>
  );
}

// ─── CLINIC MATERIALS PAGE ────────────────────────────────────────────────────
function ClinicMaterialsPage({ finances, setFinances }) {
  const CATEGORIES = ["Composite Resin","Amalgam","Glass Ionomer","Bonding Agent","Etchant","Impression Material","Gypsum / Plaster","Anesthetic Cartridge","Suture","Surgical Gloves","Masks","Burs / Drills","Endodontic Files","Paper Points","Gutta-Percha","Crown Temporization","Cement","Whitening Gel","Orthodontic Wire","Orthodontic Brackets","Elastics","Other"];
  const emptyForm = {name:"",category:"Composite Resin",quantity:"",unit:"box",cost:"",date:today(),expiryDate:"",supplier:"",notes:""};
  const [form, setForm] = useState(emptyForm);
  const [flash, setFlash] = useState(false);
  const [confirmDel, setConfirmDel] = useState(null);
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("All");

  const materials = finances.clinicMaterials || [];
  const filteredMats = materials.filter(m =>
    (filterCat==="All" || m.category===filterCat) &&
    (m.name.toLowerCase().includes(search.toLowerCase()) || (m.supplier||"").toLowerCase().includes(search.toLowerCase()))
  );

  const totalValue = materials.reduce((s,m)=>s+(parseFloat(m.cost)||0)*(parseFloat(m.quantity)||1),0);
  const expiringSoon = materials.filter(m=>{
    if(!m.expiryDate) return false;
    const days=(new Date(m.expiryDate)-new Date())/(1000*60*60*24);
    return days>=0 && days<=30;
  });

  function addMaterial() {
    if (!form.name || !form.cost) return;
    const item = {id:Date.now(),...form,cost:parseFloat(form.cost)||0,quantity:parseFloat(form.quantity)||1};
    setFinances(f=>({...f, clinicMaterials:[...(f.clinicMaterials||[]),item]}));
    setForm(emptyForm);
    setFlash(true); setTimeout(()=>setFlash(false),2000);
  }

  function delMaterial(id) {
    setFinances(f=>({...f,clinicMaterials:(f.clinicMaterials||[]).filter(m=>m.id!==id)}));
    setConfirmDel(null);
  }

  const UNITS = ["box","pack","piece","bottle","tube","roll","pair","set","vial","syringe"];
  const allCats = ["All",...new Set(materials.map(m=>m.category))];

  return (
    <div style={{padding:"1.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <h2 style={{margin:0,fontSize:20,fontWeight:600,color:"#1a237e"}}>🧪 Clinic Materials</h2>
        <div style={{display:"flex",gap:10}}>
          <div style={{background:"#fff",borderRadius:10,padding:"8px 16px",border:"1px solid #e0e0e0",textAlign:"center"}}>
            <div style={{fontSize:10,color:"#888"}}>Total Stock Value</div>
            <div style={{fontSize:18,fontWeight:700,color:"#1a237e"}}>{fmt(totalValue)} EGP</div>
          </div>
          {expiringSoon.length>0&&(
            <div style={{background:"#fff3e0",borderRadius:10,padding:"8px 16px",border:"1px solid #ffe082",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#e65100"}}>⚠️ Expiring &lt;30 days</div>
              <div style={{fontSize:18,fontWeight:700,color:"#e65100"}}>{expiringSoon.length} item{expiringSoon.length!==1?"s":""}</div>
            </div>
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:"1rem"}}>
        {/* Add form */}
        <section style={S.card}>
          <h3 style={S.sh}>Add Material / Supply</h3>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <label style={S.lbl}>Item Name *
              <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={S.inp} placeholder="e.g. Composite Resin A2"/>
            </label>
            <label style={S.lbl}>Category
              <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={S.inp}>
                {CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </select>
            </label>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}>
              <label style={S.lbl}>Quantity
                <input type="number" value={form.quantity} onChange={e=>setForm(p=>({...p,quantity:e.target.value}))} style={S.inp} placeholder="1"/>
              </label>
              <label style={S.lbl}>Unit
                <select value={form.unit} onChange={e=>setForm(p=>({...p,unit:e.target.value}))} style={S.inp}>
                  {UNITS.map(u=><option key={u}>{u}</option>)}
                </select>
              </label>
            </div>
            <label style={S.lbl}>Cost per Unit (EGP) *
              <input type="number" value={form.cost} onChange={e=>setForm(p=>({...p,cost:e.target.value}))} style={S.inp}/>
            </label>
            <label style={S.lbl}>Purchase Date
              <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={S.inp}/>
            </label>
            <label style={S.lbl}>Expiry Date
              <input type="date" value={form.expiryDate} onChange={e=>setForm(p=>({...p,expiryDate:e.target.value}))} style={S.inp}/>
            </label>
            <label style={S.lbl}>Supplier / Brand
              <input value={form.supplier} onChange={e=>setForm(p=>({...p,supplier:e.target.value}))} style={S.inp} placeholder="e.g. 3M, Dentsply"/>
            </label>
            <label style={S.lbl}>Notes
              <textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} rows={2} style={S.ta}/>
            </label>
          </div>
          <button onClick={addMaterial} style={{...S.btn(flash?"#2e7d32":"#e65100"),marginTop:10,transition:"background .3s"}}>
            {flash?<>✓ Added!</>:<>🧪 Add Material</>}
          </button>
        </section>

        {/* Inventory list */}
        <section style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem",flexWrap:"wrap",gap:8}}>
            <h3 style={{...S.sh,margin:0}}>Inventory ({materials.length} items)</h3>
            <div style={{display:"flex",gap:8}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{...S.inp,width:150,padding:"5px 10px"}}/>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{...S.inp,width:150,padding:"5px 10px"}}>
                {allCats.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>

          {!filteredMats.length
            ? <p style={{color:"#999",textAlign:"center",padding:"2rem"}}>No materials yet. Add supplies above.</p>
            : (
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {filteredMats.map((m,i)=>{
                  const totalCost=(parseFloat(m.cost)||0)*(parseFloat(m.quantity)||1);
                  const isExpiring = m.expiryDate && (new Date(m.expiryDate)-new Date())/(1000*60*60*24)<=30 && (new Date(m.expiryDate)-new Date())/(1000*60*60*24)>=0;
                  const isExpired  = m.expiryDate && new Date(m.expiryDate)<new Date();
                  return (
                    <div key={m.id||i} style={{
                      background: isExpired?"#fce4ec":isExpiring?"#fff8e1":"#fafafa",
                      borderRadius:8,padding:".75rem 1rem",
                      border:`1px solid ${isExpired?"#ef9a9a":isExpiring?"#ffe082":"#e0e0e0"}`,
                      display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8
                    }}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <span style={{fontWeight:700,fontSize:13,color:"#1a237e"}}>{m.name}</span>
                          <span style={{...S.badge("#e8eaf6","#3949ab"),fontSize:10}}>{m.category}</span>
                          {isExpired&&<span style={{...S.badge("#fce4ec","#c62828"),fontSize:10}}>⚠️ EXPIRED</span>}
                          {isExpiring&&!isExpired&&<span style={{...S.badge("#fff3e0","#e65100"),fontSize:10}}>⏰ Expiring soon</span>}
                        </div>
                        <div style={{fontSize:12,color:"#666",marginTop:3,display:"flex",flexWrap:"wrap",gap:10}}>
                          <span>📦 {m.quantity} {m.unit}</span>
                          {m.supplier&&<span>🏭 {m.supplier}</span>}
                          <span>🗓 Purchased: {m.date}</span>
                          {m.expiryDate&&<span style={{color:isExpired?"#c62828":isExpiring?"#e65100":"#666"}}>📅 Expires: {m.expiryDate}</span>}
                        </div>
                        {m.notes&&<div style={{fontSize:11,color:"#888",marginTop:2,fontStyle:"italic"}}>{m.notes}</div>}
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#2e7d32"}}>{fmt(totalCost)} EGP</div>
                          <div style={{fontSize:10,color:"#999"}}>{fmt(m.cost)}/unit</div>
                        </div>
                        <button onClick={()=>setConfirmDel(m)} style={S.delbtn}>🗑</button>
                      </div>
                    </div>
                  );

async function callClaude(systemPrompt, userPrompt, maxTokens=1000) {
  const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=" + GEMINI_API_KEY;
  
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{
        parts: [{ 
          text: systemPrompt + "\n\nUser: " + userPrompt 
        }]
      }],
      generationConfig: { 
        temperature: 0.1,

  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));

  }
  
  const data = await response.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

// ─── Voice Recording Helper ──────────────────────────────────────────────────
function useVoiceRecorder(onTranscriptReady) {
  const [recording, setRecording] = React.useState(false);
  const [error, setError] = React.useState("");
  const recRef = React.useRef(null);
  const chunksRef = React.useRef([]);

  async function start() {
    try {
      setError("");
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      chunksRef.current = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        // Convert to base64 and send to Claude for transcription simulation
        // Since we can't use Whisper directly, we use Claude's text capabilities
        // with a user-friendly fallback
        try {
          const reader = new FileReader();
          reader.onload = async (ev) => {
            // We'll use the Web Speech API as primary, Claude as enhancement
            onTranscriptReady("🎤 Voice recorded. Click 'Process Voice' to extract data.", blob);
          };
          reader.readAsDataURL(blob);
        } catch(e) {
          onTranscriptReady("Voice recorded.", blob);
        }
      };
      mr.start();
      recRef.current = mr;
      setRecording(true);
    } catch(e) {
      setError("Microphone access denied. Please allow microphone access.");
    }
  }

  function stop() {
    if (recRef.current && recRef.current.state !== 'inactive') {
      recRef.current.stop();
    }
    setRecording(false);
  }

  return { recording, error, start, stop };
}

// onResult(parsed, transcript) — parsed has full medical + dental fields
function VoiceInputButton({ onResult, context = "dental history", style = {}, inline = false }) {
  const [status, setStatus]       = React.useState("idle"); // idle|listening|processing|done|error
  const [transcript, setTranscript] = React.useState("");
  const [aiResult, setAiResult]   = React.useState(null);
  const [open, setOpen]           = React.useState(false);
  const [interimText, setInterim] = React.useState("");
  const recognitionRef = React.useRef(null);

  const hasWebSpeech = typeof window !== 'undefined' &&
    ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

  function startListening() {
    if (!hasWebSpeech) { setStatus("error"); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'en-US';
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    rec.continuous = true;
    rec.onresult = e => {
      let fin = "", int = "";
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) fin += e.results[i][0].transcript + " ";
        else int += e.results[i][0].transcript;
      }
      if (fin) setTranscript(fin.trim());
      setInterim(int);
    };
    rec.onerror = () => setStatus("error");
    rec.onend   = () => { setStatus("idle"); setInterim(""); };
    recognitionRef.current = rec;
    rec.start();
    setStatus("listening");
  }

  function stopListening() {
    if (recognitionRef.current) recognitionRef.current.stop();
    setStatus("idle"); setInterim("");
  }

  async function processWithAI() {
    if (!transcript.trim()) return;
    setStatus("processing");
    try {
      // ── COMPREHENSIVE prompt: separates medical from dental history precisely ──
      const systemPrompt = `You are an expert dental clinic AI scribe. The dentist dictated a patient history. 
Extract EVERY clinical detail and map it to the exact JSON fields below.

IMPORTANT RULES:
- conditions: ONLY systemic medical diseases (heart disease, diabetes, hypertension, etc.)
- allergies: drug or material allergies ONLY (penicillin, latex, etc.)
- medications: current medications / therapies (insulin, blood thinners, etc.)
- smoking: ONLY one of: "Never" | "Former" | "Current (Light)" | "Current (Moderate)" | "Current (Heavy)"
- alcohol: ONLY one of: "Never" | "Social" | "Moderate" | "Heavy"
- dentalNotes: ALL dental-specific clinical observations (pocket depth, bleeding, mobility, plaque, calculus, periapical status, occlusion, TMJ, soft tissue, etc.)
- chiefComplaint: patient's main reason for visit in their own words
- bp / hr / rr / temp / height / weight: numbers only, no units
- pregnant / nursing / betelQuid: true or false only
- trimester: "First" | "Second" | "Third" or ""
- anesthesiaReaction / bleedingHistory / healingHistory: free text or ""
- additionalNotes: anything medical not covered above
- otherHabits: nail biting, bruxism, mouth breathing, etc.

Return ONLY this JSON (no markdown, no explanation):
{
  "chiefComplaint": "",
  "conditions": [],
  "allergies": [],
  "medications": [],
  "otherConditions": "",
  "otherAllergies": "",
  "otherMedications": "",
  "smoking": "",
  "alcohol": "",
  "betelQuid": false,
  "otherHabits": "",
  "pregnant": false,
  "nursing": false,
  "trimester": "",
  "bp": "",
  "hr": "",
  "rr": "",
  "temp": "",
  "height": "",
  "weight": "",
  "anesthesiaReaction": "",
  "bleedingHistory": "",
  "healingHistory": "",
  "additionalNotes": "",
  "dentalNotes": "",
  "summary": ""
}`;

      const raw   = await callClaude(systemPrompt, `Dentist dictation: "${transcript}"`, 900);
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setAiResult(parsed);
      setStatus("done");
      onResult && onResult(parsed, transcript);
    } catch(e) {
      setStatus("error");
      setAiResult({ summary: "Parse error — transcript: " + transcript });
    }
  }

  function reset() { setTranscript(""); setAiResult(null); setStatus("idle"); setInterim(""); }

  const pill = (bg, tc, txt) => (
    <span style={{ background: bg, color: tc, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 600 }}>{txt}</span>
  );

  return (
    <div style={{ position: "relative", display: "inline-block", ...style }}>
      <button onClick={() => setOpen(o => !o)} style={{
        background: status === "done" ? "#2e7d32" : open ? "#6a1b9a" : "#e8eaf6",
        color: open || status === "done" ? "#fff" : "#6a1b9a",
        border: "1.5px solid #9c27b0",
        borderRadius: 8, padding: "7px 16px", fontSize: 12,
        fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
        transition: "background .2s"
      }}>
        {status === "listening" ? "🔴" : status === "processing" ? "⏳" : status === "done" ? "✅" : "🎙️"}
        {status === "listening" ? " Recording…" : status === "processing" ? " Analysing…" : status === "done" ? " Applied!" : " Voice Entry"}
      </button>

      {open && (
        <>
          {/* Backdrop closes popup on outside click */}
          <div onClick={() => setOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 598, background: "rgba(0,0,0,0.22)" }} />
          {/* Panel — fixed so it never overflows off-screen */}
          <div style={{
            position: "fixed",
            top: "50%", right: 28,
            transform: "translateY(-50%)",
            zIndex: 599,
            background: "#fff", borderRadius: 16, padding: "1.25rem",
            border: "2px solid #ce93d8", boxShadow: "0 16px 64px rgba(106,27,154,0.30)",
            width: 410, maxHeight: "88vh", overflowY: "auto"
          }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#6a1b9a" }}>🎙️ Voice History Entry</div>
            <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: "#aaa", fontSize: 20, cursor: "pointer", lineHeight: 1 }}>×</button>
          </div>

          {!hasWebSpeech && (
            <div style={{ background: "#fff3e0", borderRadius: 8, padding: "8px 10px", fontSize: 12, color: "#e65100", marginBottom: 10 }}>
              ⚠️ Voice recognition requires Chrome or Edge browser.
            </div>
          )}

          {/* Instructions */}
          <div style={{ background: "#f3e5f5", borderRadius: 8, padding: "8px 10px", fontSize: 11, color: "#4a148c", marginBottom: 10, lineHeight: 1.6 }}>
            <strong>Speak naturally, for example:</strong><br/>
            <em>"Patient has hypertension and diabetes. Allergic to penicillin. Takes amlodipine and metformin. 
            Smokes half a pack daily. Chief complaint is pain in upper left molar. 
            Blood pressure 130 over 85. On examination: generalized plaque and calculus, 
            pocket depth 4mm upper left six, slight mobility grade one."</em>
          </div>

          {/* Transcript box */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#555", marginBottom: 4 }}>📝 Transcript</div>
            <textarea
              value={transcript + (interimText ? " " + interimText : "")}
              onChange={e => setTranscript(e.target.value)}
              rows={4}
              style={{ ...S.ta, fontSize: 12, background: status === "listening" ? "#f3e5f5" : "#fafafa" }}
              placeholder="Start speaking or type the history here…"

          </div>

          {/* Controls */}
          <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
            {status === "listening" ? (
              <button onClick={stopListening} style={{
                background: "#c62828", color: "#fff", border: "none",
                borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 700, cursor: "pointer",
                display: "flex", alignItems: "center", gap: 6
              }}>
                <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: "#fff", animation: "blink 1s infinite" }} />
                Stop
              </button>
            ) : (
              <button onClick={startListening} disabled={status === "processing"} style={{
                background: "#6a1b9a", color: "#fff", border: "none",
                borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 700,
                cursor: status === "processing" ? "not-allowed" : "pointer",
                opacity: status === "processing" ? 0.6 : 1
              }}>🎤 Record</button>
            )}

            <button
              onClick={processWithAI}
              disabled={!transcript.trim() || status === "processing" || status === "listening"}

                background: transcript.trim() && status !== "processing" && status !== "listening"

                color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px",
                fontSize: 12, fontWeight: 700,
                cursor: transcript.trim() && status === "idle" ? "pointer" : "not-allowed",

              }}>
              {status === "processing" ? "⏳ Extracting data…" : "✨ Extract & Auto-Fill"}
            </button>

            <button onClick={reset} style={{
              background: "#f5f5f5", color: "#666", border: "1px solid #e0e0e0",
              borderRadius: 8, padding: "8px 10px", fontSize: 12, cursor: "pointer"
            }}>🗑 Clear</button>
          </div>

          {/* Result preview */}
          {aiResult && (
            <div style={{ background: "#e8f5e9", borderRadius: 10, padding: "10px 12px", border: "1px solid #81c784" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#2e7d32", marginBottom: 6 }}>
                ✅ Data Extracted & Applied to All Fields
              </div>
              {aiResult.summary && (
                <div style={{ fontSize: 12, color: "#1b5e20", marginBottom: 8, background: "#fff", borderRadius: 6, padding: "6px 8px", fontStyle: "italic" }}>

              )}
              {/* Medical section */}
              <div style={{ fontSize: 11, fontWeight: 700, color: "#1a237e", marginBottom: 4 }}>🏥 Medical History Applied:</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
                {(aiResult.conditions || []).map((c,i) => <span key={i} style={{ background: "#fff3e0", color: "#e65100", border: "1px solid #ffe082", borderRadius: 20, padding: "1px 8px", fontSize: 10, fontWeight: 600 }}>{c}</span>)}
                {(aiResult.allergies  || []).map((a,i) => <span key={i} style={{ background: "#fce4ec", color: "#c62828", border: "1px solid #ef9a9a", borderRadius: 20, padding: "1px 8px", fontSize: 10, fontWeight: 600 }}>⚠️{a}</span>)}
                {(aiResult.medications|| []).map((m,i) => <span key={i} style={{ background: "#e3f2fd", color: "#1565c0", border: "1px solid #90caf9", borderRadius: 20, padding: "1px 8px", fontSize: 10, fontWeight: 600 }}>{m}</span>)}
                {aiResult.smoking && aiResult.smoking !== "Never" && <span style={{ background: "#fce4ec", color: "#c62828", borderRadius: 20, padding: "1px 8px", fontSize: 10 }}>🚬 {aiResult.smoking}</span>}
                {aiResult.bp && <span style={{ background: "#e8eaf6", color: "#3949ab", borderRadius: 20, padding: "1px 8px", fontSize: 10 }}>BP: {aiResult.bp}</span>}
                {aiResult.pregnant && <span style={{ background: "#fce4ec", color: "#880e4f", borderRadius: 20, padding: "1px 8px", fontSize: 10 }}>🤰 Pregnant</span>}

// ─── X-Ray AI Analysis Component ─────────────────────────────────────────────
function XRayAIAnalysis({ image, enabled }) {
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [open, setOpen]     = React.useState(false);
  const [errMsg, setErrMsg] = React.useState("");

  if (!enabled || !image?.previewUrl) return null;

  // ── Detect real media type from data URL header ───────────────────────
  function getMediaType(dataUrl) {
    if (!dataUrl) return "image/jpeg";
    const m = dataUrl.match(/^data:([^;]+);base64,/);
    const mt = m ? m[1] : "image/jpeg";
    // Claude vision supports: image/jpeg, image/png, image/gif, image/webp
    if (["image/jpeg","image/jpg","image/png","image/gif","image/webp"].includes(mt)) return mt;
    return "image/jpeg"; // safe fallback
  }

  async function analyze() {
    setLoading(true); setOpen(true); setErrMsg("");
    try {
      const systemPrompt = `You are an expert dental radiologist AI assistant. Analyze dental X-ray images and provide detailed clinical findings.
Return ONLY valid JSON (no markdown fences, no explanation):
{
  "overall_assessment": "Normal/Borderline/Requires Attention/Urgent",
  "findings": [{"area":"","observation":"","severity":"low|medium|high","recommendation":""}],
  "detected_conditions": [],
  "treatment_suggestions": [],
  "follow_up": "",
  "confidence": "Low|Medium|High",
  "disclaimer": "AI analysis is for decision support only. Always confirm with clinical examination."
}`;

      const dataUrl    = image.previewUrl;
      const mediaType  = getMediaType(dataUrl);
      const imageB64   = dataUrl.split(',')[1];

      if (!imageB64) throw new Error("No image data found.");

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1200,
          system: systemPrompt,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: mediaType, data: imageB64 }
              },
              {
                type: "text",
                text: `Please analyze this dental ${image.type} radiograph taken on ${image.date}. ${image.description ? "Additional context: " + image.description : ""} Identify any pathologies, conditions, or findings. Be specific about tooth numbers and locations using Palmer notation where possible.`
              }
            ]
          }]
        })
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        const apiErr  = errBody?.error?.message || `HTTP ${response.status}`;
        // If CORS / network error from file:// protocol, give actionable guidance
        if (response.status === 0 || apiErr.includes("CORS")) {
          throw new Error("CORS_FILE");
        }
        throw new Error(apiErr);
      }

      const data  = await response.json();
      const raw   = data.content?.[0]?.text || "{}";
      const clean = raw.replace(/```json|```/g, "").trim();

      let parsed;
      try { parsed = JSON.parse(clean); }
      catch(jsonErr) {
        // If Claude returned prose instead of JSON, wrap it
        parsed = {
          overall_assessment: "See findings below",
          findings: [{ area: "General", observation: clean, severity: "medium", recommendation: "Review with dentist" }],
          detected_conditions: [],
          treatment_suggestions: [],
          follow_up: "",
          confidence: "Medium",
          disclaimer: "AI analysis is for decision support only."
        };
      }
      setResult(parsed);

    } catch(e) {
      const msg = e.message || "";
      let friendly = "";
      if (msg === "CORS_FILE" || msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
        friendly = "Network error: Open this file from a web server (not file://) or use Claude.ai/apps. The AI needs internet access.";
      } else if (msg.includes("401") || msg.includes("authentication")) {
        friendly = "API key missing or invalid. This feature needs the Claude API.";
      } else if (msg.includes("529") || msg.includes("overloaded")) {
        friendly = "Claude API is busy. Please wait 30 seconds and try again.";
      } else {
        friendly = "Analysis error: " + (msg || "Unknown error. Check your internet connection.");
      }
      setErrMsg(friendly);
      setResult({ overall_assessment: "Analysis Failed", findings: [], detected_conditions: [], treatment_suggestions: [], disclaimer: friendly });
    }
    setLoading(false);
  }

  const severityColor = s => s === "high" ? "#c62828" : s === "medium" ? "#e65100" : "#2e7d32";
  const assessmentColor = a => a?.includes("Urgent") ? "#c62828" : a?.includes("Requires") ? "#e65100" : a?.includes("Borderline") ? "#f57f17" : "#2e7d32";

  return (
    <div style={{ marginTop: 8 }}>
      <button onClick={analyze} disabled={loading} style={{
        background: loading ? "#e0e0e0" : "linear-gradient(135deg,#1a237e,#6a1b9a)",
        color: loading ? "#999" : "#fff", border: "none", borderRadius: 8,
        padding: "9px 14px", fontSize: 12, fontWeight: 700,
        cursor: loading ? "not-allowed" : "pointer",
        display: "flex", alignItems: "center", gap: 6, width: "100%", justifyContent: "center",
        boxShadow: loading ? "none" : "0 3px 12px rgba(26,35,126,0.25)"
      }}>
        {loading ? "⏳ Analyzing X-Ray with AI…" : "🤖 AI X-Ray Analysis"}
      </button>
      {errMsg && !loading && (
        <div style={{ marginTop: 8, background: "#fff3e0", borderRadius: 8, padding: "10px 12px", border: "1px solid #ffe082", fontSize: 12, color: "#e65100", lineHeight: 1.6 }}>
          <strong>⚠️ Could not complete analysis</strong><br/>{errMsg}
          <div style={{ marginTop: 6, fontSize: 11, color: "#888" }}>
            💡 Tip: Make sure you are connected to the internet and the file is served from a web server (not opened directly from your desktop).
          </div>
        </div>
      )}

      {open && result && (
        <div style={{ marginTop: 8, background: "#f3e5f5", borderRadius: 10, padding: "10px 12px", border: "1px solid #ce93d8" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#4a148c" }}>🤖 AI Radiograph Analysis</div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {result.overall_assessment && (
                <span style={{ background: assessmentColor(result.overall_assessment), color: "#fff", borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>
                  {result.overall_assessment}
                </span>
              )}
              {result.confidence && <span style={{ fontSize: 10, color: "#888" }}>Confidence: {result.confidence}</span>}
            </div>
          </div>

          {(result.findings || []).map((f, i) => (
            <div key={i} style={{ background: "#fff", borderRadius: 8, padding: "8px 10px", marginBottom: 6, borderLeft: `3px solid ${severityColor(f.severity)}` }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: severityColor(f.severity) }}>{f.area}</div>
              <div style={{ fontSize: 12, color: "#333", marginTop: 2 }}>{f.observation}</div>
              {f.recommendation && <div style={{ fontSize: 11, color: "#1565c0", marginTop: 3 }}>💡 {f.recommendation}</div>}
            </div>
          ))}

          {(result.detected_conditions || []).length > 0 && (
            <div style={{ marginBottom: 6 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#6a1b9a", marginBottom: 4 }}>🔍 Detected Conditions</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {result.detected_conditions.map((c, i) => (
                  <span key={i} style={{ background: "#fce4ec", color: "#c62828", borderRadius: 20, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>{c}</span>
                ))}
              </div>
            </div>
          )}

          {(result.treatment_suggestions || []).length > 0 && (
            <div style={{ marginBottom: 6 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#2e7d32", marginBottom: 4 }}>🦷 Treatment Suggestions</div>
              {result.treatment_suggestions.map((t, i) => (
                <div key={i} style={{ fontSize: 12, color: "#333", marginBottom: 2 }}>• {t}</div>
              ))}
            </div>
          )}

          {result.follow_up && (
            <div style={{ fontSize: 11, color: "#1565c0", marginBottom: 6 }}>📅 Follow-up: {result.follow_up}</div>
          )}

          <div style={{ background: "#fff3e0", borderRadius: 6, padding: "6px 10px", fontSize: 10, color: "#e65100", fontStyle: "italic" }}>
            ⚠️ {result.disclaimer || "AI analysis is for decision support only."}
          </div>

          <button onClick={() => setOpen(false)} style={{ marginTop: 6, width: "100%", background: "transparent", border: "none", color: "#9c27b0", fontSize: 11, cursor: "pointer" }}>
            Collapse ↑
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Predictive Treatment Planning ───────────────────────────────────────────
function TreatmentPlanAI({ patient, enabled, onPlanGenerated }) {
  const [loading, setLoading] = React.useState(false);
  const [plan, setPlan] = React.useState(null);

  if (!enabled) return null;

  async function generate() {
    setLoading(true);
    const mh = patient.medHist || {};
    const chartSummary = Object.entries(patient.dentalChart || {}).map(([k, v]) => `${k}:${v}`).join(", ");
    const procSummary = (patient.procedures || []).map(p => `${p.date} ${p.procedure} tooth ${p.tooth}`).join("; ");

    try {
      const systemPrompt = `You are a dental treatment planning AI. Based on patient data, generate a prioritized treatment plan.
Return ONLY a JSON object:
{
  "risk_level": "Low|Moderate|High",
  "immediate_priorities": [{"treatment":"","reason":"","urgency":"urgent|soon|routine","estimated_cost_egp":""}],
  "short_term_plan": [{"phase":"","treatments":[],"timeline":"","notes":""}],
  "long_term_maintenance": [],
  "patient_education": [],
  "estimated_total_egp": "",
  "next_appointment_recommendation": ""
}`;
      const prompt = `Patient: ${patient.name}, Age: ${patient.age}, Gender: ${patient.gender}
Chief complaint: ${patient.chiefComplaint || "None"}
Medical conditions: ${(mh.conditions || []).join(", ") || "None"}
Allergies: ${(mh.allergies || []).join(", ") || "None"}
Medications: ${(mh.medications || []).join(", ") || "None"}
Smoking: ${mh.smoking || "Never"}, Alcohol: ${mh.alcohol || "Never"}
Dental chart: ${chartSummary || "Not recorded"}
Past procedures: ${procSummary || "None"}
Dental notes: ${patient.dentalNotes || "None"}`;

      const raw = await callClaude(systemPrompt, prompt, 1000);
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setPlan(parsed);
      onPlanGenerated && onPlanGenerated(parsed);
    } catch(e) {
      setPlan({ risk_level: "Unknown", immediate_priorities: [], short_term_plan: [], long_term_maintenance: [], patient_education: [], next_appointment_recommendation: "Please review manually." });
    }
    setLoading(false);
  }

  const riskColor = r => r === "High" ? "#c62828" : r === "Moderate" ? "#e65100" : "#2e7d32";
  const urgencyColor = u => u === "urgent" ? "#c62828" : u === "soon" ? "#e65100" : "#1565c0";

  return (
    <div style={{ marginTop: 12 }}>
      <button onClick={generate} disabled={loading} style={{
        background: loading ? "#e0e0e0" : "linear-gradient(135deg,#00695c,#1565c0)",
        color: "#fff", border: "none", borderRadius: 10,
        padding: "10px 18px", fontSize: 13, fontWeight: 700,
        cursor: loading ? "not-allowed" : "pointer",
        display: "flex", alignItems: "center", gap: 8
      }}>
        {loading ? "⏳ Generating Plan…" : "🧠 Generate AI Treatment Plan"}
      </button>

      {plan && (
        <div style={{ marginTop: 10, background: "#e0f7fa", borderRadius: 12, padding: "1rem", border: "1px solid #80deea" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: "#006064" }}>🧠 AI Treatment Plan — {patient.name}</div>
            <span style={{ background: riskColor(plan.risk_level), color: "#fff", borderRadius: 20, padding: "3px 12px", fontSize: 12, fontWeight: 700 }}>
              {plan.risk_level} Risk
            </span>

// ─── Smart Scheduling AI ─────────────────────────────────────────────────────
function SmartSchedulingAI({ patients, onSchedule }) {
  const [loading, setLoading] = React.useState(false);
  const [suggestions, setSuggestions] = React.useState(null);

  async function generateSchedule() {
    setLoading(true);
    const overdue = patients.filter(p => {
      const lastAppt = (p.appointments || []).filter(a => a.status === "Completed").sort((a, b) => b.date > a.date ? 1 : -1)[0];
      if (!lastAppt) return true;
      const daysSince = (new Date() - new Date(lastAppt.date)) / (1000 * 60 * 60 * 24);
      return daysSince > 180;
    }).slice(0, 10);

    const upcoming = patients.flatMap(p =>
      (p.appointments || []).filter(a => a.status === "Scheduled" && a.date >= today()).map(a => ({ ...a, patientName: p.name }))
    ).sort((a, b) => a.date > b.date ? 1 : -1).slice(0, 5);

    try {
      const systemPrompt = `You are a smart dental clinic scheduling AI. Suggest optimized appointment scheduling.
Return ONLY a JSON object:
{
  "scheduling_insights": [],
  "overdue_recalls": [{"patient":"","last_seen":"","recommended_date":"","priority":"high|medium|low","reason":""}],
  "schedule_optimization_tips": [],
  "busiest_slots": "",
  "recommended_slots": []
}`;
      const prompt = `Patients needing recall (${overdue.length}): ${overdue.map(p => `${p.name}(last: ${(p.appointments || []).filter(a => a.status === "Completed").sort((a, b) => b.date > a.date ? 1 : -1)[0]?.date || "never"})`).join("; ")}
Upcoming scheduled: ${upcoming.map(a => `${a.date} ${a.time} ${a.patientName}: ${a.purpose}`).join("; ")}
Today: ${today()}`;

      const raw = await callClaude(systemPrompt, prompt, 800);
      const clean = raw.replace(/```json|```/g, "").trim();
      setSuggestions(JSON.parse(clean));
    } catch(e) {
      setSuggestions({ scheduling_insights: ["Smart scheduling analysis ready."], overdue_recalls: [], schedule_optimization_tips: ["Keep morning slots for longer procedures", "Schedule recalls at least 2 weeks in advance"], recommended_slots: [] });
    }
    setLoading(false);
  }

  return (
    <div style={S.card}>
      <h3 style={{ ...S.sh, color: "#00695c" }}>🤖 Smart Scheduling AI</h3>
      <button onClick={generateSchedule} disabled={loading} style={{
        ...S.btn(loading ? "#e0e0e0" : "#00695c"),
        marginBottom: 10
      }}>
        {loading ? "⏳ Analyzing schedule…" : "📅 Generate Smart Schedule Insights"}
      </button>

      {suggestions && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {(suggestions.scheduling_insights || []).length > 0 && (
            <div style={{ background: "#e0f7fa", borderRadius: 8, padding: "10px 12px", border: "1px solid #80deea" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#006064", marginBottom: 5 }}>💡 Insights</div>
              {suggestions.scheduling_insights.map((ins, i) => <div key={i} style={{ fontSize: 12, color: "#333", marginBottom: 2 }}>• {ins}</div>)}
            </div>
          )}

          {(suggestions.overdue_recalls || []).length > 0 && (
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#e65100", marginBottom: 6 }}>⏰ Patients Needing Recall</div>
              {suggestions.overdue_recalls.map((r, i) => (
                <div key={i} style={{ background: r.priority === "high" ? "#fce4ec" : "#fff8e1", borderRadius: 8, padding: "8px 10px", marginBottom: 5, border: `1px solid ${r.priority === "high" ? "#ef9a9a" : "#ffe082"}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{r.patient}</div>
                    <div style={{ fontSize: 11, color: "#666" }}>Last seen: {r.last_seen || "Never"} · {r.reason}</div>
                    {r.recommended_date && <div style={{ fontSize: 11, color: "#1565c0", fontWeight: 600 }}>Suggested: {r.recommended_date}</div>}
                  </div>
                  <span style={{ background: r.priority === "high" ? "#c62828" : "#e65100", color: "#fff", borderRadius: 20, padding: "2px 8px", fontSize: 10, fontWeight: 700 }}>{r.priority}</span>
                </div>
              ))}
            </div>
          )}

          {(suggestions.schedule_optimization_tips || []).length > 0 && (
            <div style={{ background: "#f3e5f5", borderRadius: 8, padding: "10px 12px", border: "1px solid #ce93d8" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#6a1b9a", marginBottom: 5 }}>⚡ Optimization Tips</div>
              {suggestions.schedule_optimization_tips.map((t, i) => <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 2 }}>• {t}</div>)}
            </div>
          )}

          {suggestions.busiest_slots && (
            <div style={{ fontSize: 12, color: "#888" }}>📊 {suggestions.busiest_slots}</div>

// ─── Smart Appointment Reminders AI ──────────────────────────────────────────
function SmartRemindersAI({ patients, dentistName, clinicName }) {
  const [loading,    setLoading]    = React.useState(false);
  const [messages,   setMessages]   = React.useState(null);
  const [sent,       setSent]       = React.useState({}); // track which appts had WA opened
  const [autoSending,setAutoSending]= React.useState(false);
  const [autoLog,    setAutoLog]    = React.useState([]);

  const upcoming = patients.flatMap(p =>
    (p.appointments || [])
      .filter(a => a.status === "Scheduled" && a.date >= today())
      .map(a => ({
        ...a,
        patientName:  p.name,
        patientId:    p.id,
        patientPhone: p.phone,
        patientEmail: p.email
      }))
  ).sort((a, b) => (a.date + a.time) > (b.date + b.time) ? 1 : -1).slice(0, 12);

  // ── Format the date nicely for the patient ─────────────────────────────
  function prettyDate(dateStr) {
    try {
      return new Date(dateStr + "T00:00:00").toLocaleDateString("en-EG", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
      });
    } catch(e) { return dateStr; }
  }

  // ── Build messages with exact date + time + clinic name ───────────────
  async function generateMessages(appt) {
    setLoading(true);
    const dateFormatted = prettyDate(appt.date);
    const timeFormatted = fmtTime(appt.time);

    try {
      const systemPrompt = `You are a dental clinic AI assistant. Generate warm, professional appointment reminder messages.
The messages MUST include:
  - Patient's first name
  - The exact appointment DATE (formatted nicely)
  - The exact appointment TIME
  - The appointment PURPOSE
  - End with the clinic name: "${clinicName || "Dental Clinic"}"
  - Dr. name: "Dr. ${dentistName || "Your Dentist"}"

Keep SMS under 160 characters. WhatsApp can be longer and warmer.

Return ONLY this JSON (no markdown):
{
  "sms": "",
  "whatsapp": "",
  "email_subject": "",
  "email_body": "",
  "pre_appointment_instructions": []
}`;

      const prompt = `Patient name: ${appt.patientName}
Date: ${dateFormatted}
Time: ${timeFormatted}
Purpose: ${appt.purpose}
Notes: ${appt.notes || "none"}
Clinic: ${clinicName || "Dental Clinic"}
Dr.: ${dentistName || "Doctor"}`;

      const raw   = await callClaude(systemPrompt, prompt, 700);
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      // ── Guarantee the clinic name & date/time are in every message ──
      // SMS: strict 160-char version
      const smsGuaranteed = parsed.sms ||
        `Hi ${appt.patientName.split(" ")[0]}, reminder: your dental appointment (${appt.purpose}) is on ${dateFormatted} at ${timeFormatted}. ${clinicName || "Dental Clinic"}`;

      // WhatsApp: rich version
      const waGuaranteed = parsed.whatsapp ||
`Dear ${appt.patientName.split(" ")[0]},

We hope you're well! 😊 This is a friendly reminder that your dental appointment is scheduled:

📅 *Date:* ${dateFormatted}
🕐 *Time:* ${timeFormatted}
🦷 *Purpose:* ${appt.purpose}
👨‍⚕️ *Doctor:* Dr. ${dentistName || "Your Dentist"}

If you have any questions or need to reschedule, please don't hesitate to contact us.

We look forward to seeing you! 🙏

*${clinicName || "Dental Clinic"}*`;

      setMessages({
        ...parsed,
        sms:      smsGuaranteed,
        whatsapp: waGuaranteed,
        appt,
        dateFormatted,
        timeFormatted
      });
    } catch(e) {
      // Fallback: build messages locally without AI
      const firstName = appt.patientName.split(" ")[0];
      const sms = `Hi ${firstName}, your dental appt (${appt.purpose}) is ${dateFormatted} at ${timeFormatted}. ${clinicName || "Dental Clinic"}`;
      const wa  =
`Dear ${firstName},

This is a reminder for your upcoming dental appointment:

📅 *Date:* ${dateFormatted}
🕐 *Time:* ${timeFormatted}
🦷 *Purpose:* ${appt.purpose}
👨‍⚕️ *Dr.* ${dentistName || "Your Dentist"}

We look forward to seeing you!

*${clinicName || "Dental Clinic"}*`;
      setMessages({ sms, whatsapp: wa, email_subject: "", email_body: "", pre_appointment_instructions: [], appt, dateFormatted, timeFormatted });
    }
    setLoading(false);
  }

  // ── One-tap WhatsApp launch ────────────────────────────────────────────
  // Opens wa.me link which auto-opens the WhatsApp chat with message pre-filled.
  // On mobile: opens the WhatsApp app directly. On desktop: opens WhatsApp Web.
  // The patient only needs to tap "Send" once inside WhatsApp.
  function openWhatsApp(phone, text) {
    if (!phone) return;
    const clean = phone.replace(/\D/g, "");
    // Egyptian numbers: add 20 prefix if starts with 01
    const intl = clean.startsWith("0") ? "2" + clean : clean;
    const url  = `https://wa.me/${intl}?text=${encodeURIComponent(text)}`;
    window.open(url, "_blank");
  }

  // ── Auto-send all: opens WhatsApp for each patient sequentially ────────
  // True background sending requires a WhatsApp Business API (paid server service).
  // The best achievable in a pure browser app is to open each chat tab automatically.
  async function autoSendAll() {
    if (!upcoming.length) return;
    setAutoSending(true);
    setAutoLog([]);
    const log = [];

    for (const appt of upcoming) {
      if (!appt.patientPhone) {
        log.push({ name: appt.patientName, status: "⚠️ No phone number" });
        setAutoLog([...log]);
        continue;
      }
      const firstName = appt.patientName.split(" ")[0];
      const dateFormatted = prettyDate(appt.date);
      const timeFormatted = fmtTime(appt.time);
      const msg =
`Dear ${firstName},

This is a reminder for your upcoming dental appointment:

📅 *Date:* ${dateFormatted}
🕐 *Time:* ${timeFormatted}
🦷 *Purpose:* ${appt.purpose}
👨‍⚕️ *Dr.* ${dentistName || "Your Dentist"}

We look forward to seeing you!

*${clinicName || "Dental Clinic"}*`;

      openWhatsApp(appt.patientPhone, msg);
      log.push({ name: appt.patientName, date: dateFormatted, time: timeFormatted, status: "📲 WhatsApp opened" });
      setAutoLog([...log]);
      setSent(prev => ({ ...prev, [appt.id]: true }));
      // Small delay so browser doesn't block multiple popups
      await new Promise(r => setTimeout(r, 1800));
    }
    setAutoSending(false);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
      {/* ── Header card ── */}
      <div style={{ ...S.card, background: "linear-gradient(135deg,#f3e5f5,#e8eaf6)", border: "1px solid #ce93d8" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
          <div>
            <h3 style={{ ...S.sh, color: "#4a148c", margin: 0 }}>📲 Smart Appointment Reminders</h3>
            <div style={{ fontSize: 12, color: "#7b1fa2", marginTop: 4 }}>
              AI-generated reminders with exact date, time & clinic name — sent via WhatsApp in one tap.
            </div>
          </div>
          {upcoming.length > 0 && (
            <button
              onClick={autoSendAll}
              disabled={autoSending}
              style={{
                background: autoSending ? "#e0e0e0" : "linear-gradient(135deg,#25d366,#1a9650)",
                color: "#fff", border: "none", borderRadius: 10,
                padding: "10px 18px", fontSize: 13, fontWeight: 700,
                cursor: autoSending ? "not-allowed" : "pointer",
                display: "flex", alignItems: "center", gap: 8,
                boxShadow: autoSending ? "none" : "0 4px 16px rgba(37,211,102,0.35)"
              }}>
              {autoSending ? "⏳ Opening WhatsApp…" : `💬 Send All ${upcoming.length} Reminders via WhatsApp`}
            </button>
          )}
        </div>

        {/* Important note about WhatsApp */}
        <div style={{ marginTop: 10, background: "rgba(255,255,255,0.7)", borderRadius: 8, padding: "8px 12px", fontSize: 11, color: "#555", lineHeight: 1.6 }}>
          <strong>📌 How it works:</strong> Clicking "Send" opens the patient's WhatsApp chat with the full message pre-filled.
          The patient sees your message instantly — they just need to read it. You tap "Send" once inside WhatsApp.
          <br/><strong>True auto-send without touching the phone</strong> requires a WhatsApp Business API account (external paid service).
        </div>
      </div>

      {/* ── Auto-send log ── */}
      {autoLog.length > 0 && (
        <div style={{ ...S.card, background: "#e8f5e9", border: "1px solid #81c784" }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: "#1b5e20", marginBottom: 8 }}>📋 Send Log</div>
          {autoLog.map((l, i) => (
            <div key={i} style={{ fontSize: 12, color: "#333", marginBottom: 4, display: "flex", gap: 8 }}>
              <span style={{ fontSize: 14 }}>{l.status.split(" ")[0]}</span>
              <span><strong>{l.name}</strong> {l.date && `— ${l.date} ${l.time}`} {l.status.split(" ").slice(1).join(" ")}</span>
            </div>
          ))}
        </div>
      )}

      {/* ── Per-patient list ── */}
      <div style={S.card}>
        <h3 style={{ ...S.sh, color: "#6a1b9a" }}>Upcoming Appointments ({upcoming.length})</h3>

        {upcoming.length === 0
          ? <div style={{ color: "#999", fontSize: 12, textAlign: "center", padding: "1rem" }}>No upcoming scheduled appointments.</div>
          : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {upcoming.map((a, i) => {
              const waText =
`Dear ${a.patientName.split(" ")[0]},

📅 *Date:* ${prettyDate(a.date)}
🕐 *Time:* ${fmtTime(a.time)}
🦷 *Purpose:* ${a.purpose}
👨‍⚕️ *Dr.* ${dentistName || "Your Dentist"}

*${clinicName || "Dental Clinic"}*`;
              const isSent = sent[a.id];
              return (
                <div key={i} style={{
                  background: isSent ? "#e8f5e9" : "#f8f9ff",
                  borderRadius: 10, padding: "10px 14px",
                  border: `1px solid ${isSent ? "#81c784" : "#c5cae9"}`,
                  display: "flex", justifyContent: "space-between",
                  alignItems: "center", gap: 10, flexWrap: "wrap"
